<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Exkombeiros - Painel Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
       .header { background: #1a472a; color: white; padding: 20px; text-align: center; }
       .header h1 { font-size: 28px; margin-bottom: 15px; }
       .header h1 em { font-style: italic; font-weight: 300; }
       .stats { display: flex; justify-content: space-around; max-width: 600px; margin: 0 auto; }
       .stat { text-align: center; }
       .stat-value { font-size: 32px; font-weight: bold; }
       .stat-label { font-size: 12px; opacity: 0.9; text-transform: uppercase; }
       .tabs { display: flex; background: white; border-bottom: 2px solid #e0e0e0; }
       .tab { flex: 1; padding: 15px; text-align: center; background: none; border: none; font-size: 16px; cursor: pointer; color: #666; }
       .tab.active { color: #1a472a; border-bottom: 3px solid #1a472a; font-weight: 600; }
       .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
       .section { background: #1a472a; color: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
       .section-title { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 600; }
       .section-badge { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 12px; font-size: 14px; }
       .category { background: white; border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
       .category-info { display: flex; align-items: center; gap: 10px; }
       .category-name { font-weight: 500; }
       .category-weight { color: #999; font-size: 14px; }
       .options { display: flex; gap: 8px; flex-wrap: wrap; }
       .option { padding: 8px 16px; border: 2px solid #e0e0e0; background: white; border-radius: 20px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
       .option:hover { border-color: #1a472a; }
       .option.selected { background: #1a472a; color: white; border-color: #1a472a; }
       .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; font-family: inherit; }
        input:focus, textarea:focus { outline: none; border-color: #1a472a; }
       .score-display { text-align: center; padding: 30px; background: white; border-radius: 8px; margin: 20px 0; }
       .score-value { font-size: 64px; font-weight: bold; color: #d4af37; }
       .score-label { font-size: 14px; color: #666; text-transform: uppercase; margin-top: 5px; }
       .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
       .btn-primary { background: #1a472a; color: white; }
       .btn-primary:hover { background: #2d5f3f; }
       .btn-warning { background: #ffc107; color: #000; }
       .btn-danger { background: #dc3545; color: white; }
       .btn-secondary { background: #6c757d; color: white; }
       .actions { display: flex; gap: 10px; margin: 20px 0; }
       .letter { background: white; border-radius: 8px; padding: 30px; margin-top: 20px; }
       .letter-header { border-bottom: 2px solid #e0e0e0; padding-bottom: 20px; margin-bottom: 20px; }
       .letter-title { font-size: 24px; color: #1a472a; margin-bottom: 5px; }
       .letter-subtitle { color: #666; font-size: 14px; }
       .letter-actions { display: flex; gap: 10px; margin-bottom: 20px; }
       .ranking-table { background: white; border-radius: 8px; overflow: hidden; }
       .ranking-item { padding: 15px 20px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
       .ranking-item:last-child { border-bottom: none; }
       .ranking-info { flex: 1; }
       .ranking-name { font-weight: 600; font-size: 18px; margin-bottom: 4px; }
       .ranking-details { color: #666; font-size: 14px; }
       .ranking-score { font-size: 32px; font-weight: bold; color: #d4af37; margin: 0 20px; }
       .ranking-actions { display: flex; gap: 8px; }
       .btn-sm { padding: 8px 16px; font-size: 14px; }
       .hidden { display: none; }
        @media (max-width: 768px) {
           .stats { flex-direction: column; gap: 10px; }
           .category { flex-direction: column; align-items: flex-start; gap: 10px; }
           .options { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Guia <em>Exkombeiros</em></h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalCampings">0</div>
                <div class="stat-label">Campings</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="scoreMedio">0.0</div>
                <div class="stat-label">Score Médio</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalEstados">0</div>
                <div class="stat-label">Estados</div>
            </div>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab active" id="tabAvaliacao">Avaliação</button>
        <button class="tab" id="tabRanking">Ranking</button>
    </div>
    
    <div class="container">
        <div id="avaliacaoContent">
            <div class="form-row">
                <input type="text" id="nome" placeholder="Nome do Camping">
                <input type="text" id="cidade" placeholder="Cidade">
                <input type="text" id="estado" placeholder="Estado">
                <input type="date" id="data">
            </div>
            
            <div id="categorias"></div>
            
            <div class="score-display">
                <div class="score-value" id="scoreTotal">0.0</div>
                <div class="score-label">Score Técnico Final</div>
            </div>
            
            <div class="actions">
                <button class="btn btn-primary" id="btnSalvar">💾 Salvar Avaliação</button>
                <button class="btn btn-warning" id="btnLimpar">🧹 Limpar</button>
            </div>
            
            <div class="letter" id="cartaContainer" style="display: none;">
                <div class="letter-header">
                    <div class="letter-title">Guia Exkombeiros</div>
                    <div class="letter-subtitle">PAINEL DO ADMINISTRADOR</div>
                </div>
                <div class="letter-actions">
                    <button class="btn btn-secondary btn-sm" id="btnCopiar">📋 Copiar Texto Completo</button>
                </div>
                <div id="cartaContent"></div>
            </div>
        </div>
        
        <div id="rankingContent" class="hidden">
            <div class="ranking-table" id="rankingList"></div>
        </div>
    </div>
        <script>
        const categorias = [
            {
                nome: 'Energia Elétrica',
                icone: '⚡',
                peso: 15,
                opcoes: [
                    { nome: 'Não tem', pontos: 0 },
                    { nome: '110V apenas', pontos: 2 },
                    { nome: '220V apenas', pontos: 3 },
                    { nome: '110V e 220V', pontos: 5 }
                ]
            },
            {
                nome: 'Banheiros',
                icone: '🚿',
                peso: 15,
                opcoes: [
                    { nome: 'Não tem', pontos: 0 },
                    { nome: 'Compartilhado simples', pontos: 2 },
                    { nome: 'Compartilhado completo', pontos: 4 },
                    { nome: 'Privativo', pontos: 5 }
                ]
            },
            {
                nome: 'Tipo de Piso',
                icone: '🏕️',
                peso: 10,
                opcoes: [
                    { nome: 'Terra', pontos: 1 },
                    { nome: 'Grama', pontos: 3 },
                    { nome: 'Brita', pontos: 4 },
                    { nome: 'Concreto/Asfalto', pontos: 5 }
                ]
            },
            {
                nome: 'Conectividade',
                icone: '📶',
                peso: 10,
                opcoes: [
                    { nome: 'Sem sinal', pontos: 0 },
                    { nome: 'Sinal fraco', pontos: 2 },
                    { nome: 'Sinal bom', pontos: 4 },
                    { nome: 'Wi-Fi disponível', pontos: 5 }
                ]
            },
            {
                nome: 'Qualidade da Água',
                icone: '💧',
                peso: 15,
                opcoes: [
                    { nome: 'Não potável', pontos: 0 },
                    { nome: 'Potável sem tratamento', pontos: 3 },
                    { nome: 'Potável tratada', pontos: 5 }
                ]
            },
            {
                nome: 'Sombra',
                icone: '🌳',
                peso: 10,
                opcoes: [
                    { nome: 'Sem sombra', pontos: 1 },
                    { nome: 'Sombra parcial', pontos: 3 },
                    { nome: 'Sombra total', pontos: 5 }
                ]
            },
            {
                nome: 'Segurança',
                icone: '🔒',
                peso: 10,
                opcoes: [
                    { nome: 'Sem segurança', pontos: 0 },
                    { nome: 'Cercado', pontos: 3 },
                    { nome: 'Vigia/Portaria', pontos: 5 }
                ]
            },
            {
                nome: 'Serviços Extras',
                icone: '🛒',
                peso: 15,
                opcoes: [
                    { nome: 'Nenhum', pontos: 0 },
                    { nome: 'Mercado próximo', pontos: 3 },
                    { nome: 'Mercado + Restaurante', pontos: 4 },
                    { nome: 'Completo', pontos: 5 }
                ]
            }
        ];
        
        let avaliacoes = JSON.parse(localStorage.getItem('exkombeiros_avaliacoes') || '[]');
        let selecoes = {};
        let editandoId = null;
        
        function init() {
            renderCategorias();
            renderStats();
            renderRanking();
            setupEventListeners();
            document.getElementById('data').valueAsDate = new Date();
        }
        
        function setupEventListeners() {
            document.getElementById('tabAvaliacao').addEventListener('click', () => showTab('avaliacao'));
            document.getElementById('tabRanking').addEventListener('click', () => showTab('ranking'));
            document.getElementById('btnSalvar').addEventListener('click', salvarAvaliacao);
            document.getElementById('btnLimpar').addEventListener('click', limparForm);
            document.getElementById('btnCopiar').addEventListener('click', copiarTexto);
        }
        
        function renderCategorias() {
            const container = document.getElementById('categorias');
            container.innerHTML = '';
            
            categorias.forEach((cat, catIndex) => {
                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="section">
                        <div class="section-title">
                            <span>${cat.icone}</span>
                            <span>${cat.nome}</span>
                        </div>
                        <div class="section-badge">Peso: ${cat.peso}</div>
                    </div>
                `;
                
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                
                const infoDiv = document.createElement('div');
                infoDiv.className = 'category-info';
                infoDiv.innerHTML = `
                    <span class="category-name">${cat.nome}</span>
                    <span class="category-weight">(${cat.peso}%)</span>
                `;
                
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';
                
                cat.opcoes.forEach((opcao, opcaoIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option';
                    btn.textContent = opcao.nome;
                    btn.addEventListener('click', () => selecionarOpcao(catIndex, opcaoIndex));
                    optionsDiv.appendChild(btn);
                });
                
                categoryDiv.appendChild(infoDiv);
                categoryDiv.appendChild(optionsDiv);
                section.appendChild(categoryDiv);
                container.appendChild(section);
            });
        }
        
        function selecionarOpcao(catIndex, opcaoIndex) {
            selecoes[catIndex] = opcaoIndex;
            
            const sections = document.querySelectorAll('.category');
            const options = sections[catIndex].querySelectorAll('.option');
            
            options.forEach((opt, idx) => {
                if (idx === opcaoIndex) {
                    opt.classList.add('selected');
                } else {
                    opt.classList.remove('selected');
                }
            });
            
            calcularScore();
        }
                  
        function calcularScore() {
            let totalPontos = 0;
            let totalPeso = 0;
            
            categorias.forEach((cat, idx) => {
                if (selecoes[idx]!== undefined) {
                    const opcao = cat.opcoes[selecoes[idx]];
                    totalPontos += (opcao.pontos / 5) * cat.peso;
                    totalPeso += cat.peso;
                }
            });
            
            const score = totalPeso > 0? (totalPontos / totalPeso) * 5 : 0;
            document.getElementById('scoreTotal').textContent = score.toFixed(1);
            
            return score;
        }
        
        function salvarAvaliacao() {
            const nome = document.getElementById('nome').value;
            const cidade = document.getElementById('cidade').value;
            const estado = document.getElementById('estado').value;
            const data = document.getElementById('data').value;
            
            if (!nome ||!cidade ||!estado ||!data) {
                alert('Preencha todos os campos!');
                return;
            }
            
            if (Object.keys(selecoes).length < categorias.length) {
                alert('Selecione todas as categorias!');
                return;
            }
            
            const score = calcularScore();
            
            const avaliacao = {
                id: editandoId || Date.now(),
                nome,
                cidade,
                estado,
                data,
                selecoes: {...selecoes},
                score: score
            };
            
            if (editandoId) {
                const index = avaliacoes.findIndex(a => a.id === editandoId);
                avaliacoes[index] = avaliacao;
                editandoId = null;
            } else {
                avaliacoes.push(avaliacao);
            }
            
            localStorage.setItem('exkombeiros_avaliacoes', JSON.stringify(avaliacoes));
            
            renderStats();
            renderRanking();
            gerarCarta(avaliacao);
            
            alert('Avaliação salva com sucesso!');
        }
        
        function limparForm() {
            document.getElementById('nome').value = '';
            document.getElementById('cidade').value = '';
            document.getElementById('estado').value = '';
            document.getElementById('data').valueAsDate = new Date();
            selecoes = {};
            editandoId = null;
            
            document.querySelectorAll('.option.selected').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            document.getElementById('scoreTotal').textContent = '0.0';
            document.getElementById('cartaContainer').style.display = 'none';
        }
        
        function gerarCarta(avaliacao) {
            const container = document.getElementById('cartaContainer');
            const content = document.getElementById('cartaContent');
            
            let html = `
                <p><strong>Prezada equipe do ${avaliacao.nome} — ${avaliacao.cidade}/${avaliacao.estado},</strong></p>
                <br>
                <p>Somos Rogério e Viviane, criadores do Guia Exkombeiros de Camping, canal independente dedicado a viajantes com trailers, motorhomes e vans. Realizamos uma visita técnica ao seu camping em ${avaliacao.data} e compartilhamos abaixo os resultados.</p>
                <br>
                <p><strong>Nossa Metodologia</strong></p>
                <p>O Guia Exkombeiros avalia campings com base em critérios técnicos e físicos mensuráveis — energia elétrica, qualidade da água, tipo de piso, banheiros, conectividade e serviços. Esta avaliação não mede experiência subjetiva nem o acolhimento humano do local.</p>
                <br>
                <p><strong>Score Técnico Final: ${avaliacao.score.toFixed(1)} / 5</strong></p>
                <br>
                <p><strong>Detalhamento por Categoria:</strong></p>
                <ul>
            `;
            
            categorias.forEach((cat, idx) => {
                const opcaoIndex = avaliacao.selecoes[idx];
                const opcao = cat.opcoes[opcaoIndex];
                html += `<li><strong>${cat.nome}:</strong> ${opcao.nome} (${opcao.pontos}/5)</li>`;
            });
            
            html += `
                </ul>
                <br>
                <p>Atenciosamente,<br>Rogério e Viviane<br>Guia Exkombeiros</p>
            `;
            
            content.innerHTML = html;
            container.style.display = 'block';
        }
        
        function copiarTexto() {
            const content = document.getElementById('cartaContent').innerText;
            navigator.clipboard.writeText(content).then(() => {
                alert('Texto copiado!');
            });
        }
        
        function renderStats() {
            document.getElementById('totalCampings').textContent = avaliacoes.length;
            
            const media = avaliacoes.length > 0 
              ? (avaliacoes.reduce((sum, a) => sum + a.score, 0) / avaliacoes.length).toFixed(1)
                : '0.0';
            document.getElementById('scoreMedio').textContent = media;
            
            const estados = new Set(avaliacoes.map(a => a.estado)).size;
            document.getElementById('totalEstados').textContent = estados;
        }
        
        function renderRanking() {
            const container = document.getElementById('rankingList');
            const sorted = [...avaliacoes].sort((a, b) => b.score - a.score);
            
            if (sorted.length === 0) {
                container.innerHTML = '<div style="padding: 40px; text-align: center; color: #999;">Nenhuma avaliação cadastrada ainda.</div>';
                return;
            }
            
            container.innerHTML = '';
            
            sorted.forEach(av => {
                const item = document.createElement('div');
                item.className = 'ranking-item';
                item.innerHTML = `
                    <div class="ranking-info">
                        <div class="ranking-name">${av.nome}</div>
                        <div class="ranking-details">${av.cidade}/${av.estado} - ${av.data}</div>
                    </div>
                    <div class="ranking-score">${av.score.toFixed(1)}</div>
                    <div class="ranking-actions">
                        <button class="btn btn-secondary btn-sm" data-edit="${av.id}">Editar</button>
                        <button class="btn btn-danger btn-sm" data-delete="${av.id}">Excluir</button>
                    </div>
                `;
                container.appendChild(item);
            });
            
            container.querySelectorAll('[data-edit]').forEach(btn => {
                btn.addEventListener('click', (e) => editarAvaliacao(Number(e.target.dataset.edit)));
            });
            
            container.querySelectorAll('[data-delete]').forEach(btn => {
                btn.addEventListener('click', (e) => excluirAvaliacao(Number(e.target.dataset.delete)));
            });
        }
        
        function editarAvaliacao(id) {
            const av = avaliacoes.find(a => a.id === id);
            if (!av) return;
            
            document.getElementById('nome').value = av.nome;
            document.getElementById('cidade').value = av.cidade;
            document.getElementById('estado').value = av.estado;
            document.getElementById('data').value = av.data;
            
            selecoes = {...av.selecoes};
            editandoId = id;
            
            Object.keys(selecoes).forEach(catIndex => {
                const sections = document.querySelectorAll('.category');
                const options = sections[catIndex].querySelectorAll('.option');
                options.forEach((opt, idx) => {
                    if (idx === selecoes[catIndex]) {
                        opt.classList.add('selected');
                    } else {
                        opt.classList.remove('selected');
                    }
                });
            });
            
            calcularScore();
            showTab('avaliacao');
            window.scrollTo(0, 0);
        }
        
        function excluirAvaliacao(id) {
            if (!confirm('Tem certeza que deseja excluir esta avaliação?')) return;
            
            avaliacoes = avaliacoes.filter(a => a.id!== id);
            localStorage.setItem('exkombeiros_avaliacoes', JSON.stringify(avaliacoes));
            
            renderStats();
            renderRanking();
        }
        
        function showTab(tab) {
            const tabAvaliacao = document.getElementById('tabAvaliacao');
            const tabRanking = document.getElementById('tabRanking');
            const contentAvaliacao = document.getElementById('avaliacaoContent');
            const contentRanking = document.getElementById('rankingContent');
            
            if (tab === 'avaliacao') {
                tabAvaliacao.classList.add('active');
                tabRanking.classList.remove('active');
                contentAvaliacao.classList.remove('hidden');
                contentRanking.classList.add('hidden');
            } else {
                tabRanking.classList.add('active');
                tabAvaliacao.classList.remove('active');
                contentRanking.classList.remove('hidden');
                contentAvaliacao.classList.add('hidden');
            }
        }
        
        init();
    </script>
</body>
</html>
