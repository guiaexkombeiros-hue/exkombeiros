<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exkombeiros - Avaliação de Campings</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #2E7D32; text-align: center; }
    label { display: block; margin: 15px 0 5px; font-weight: bold; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    .estrelas { display: flex; gap: 5px; margin: 10px 0; }
    .estrela { font-size: 32px; cursor: pointer; color: #ddd; }
    .estrela.ativa { color: #FFC107; }
    button { background: #2E7D32; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; }
    button:disabled { background: #ccc; }
    .sucesso { background: #4CAF50; color: white; padding: 15px; border-radius: 8px; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🏕️ Exkombeiros</h1>
    <div class="sucesso" id="sucesso">Avaliação salva com sucesso!</div>
    
    <label>Avaliador</label>
    <select id="avaliador">
      <option value="Rogério">Rogério</option>
      <option value="Esposa">Esposa</option>
    </select>

    <label>Nome do Camping</label>
    <input type="text" id="camping" placeholder="Ex: Camping Paraíso">

    <label>Categoria</label>
    <select id="categoria">
      <option value="Estrutura">Estrutura</option>
      <option value="Limpeza">Limpeza</option>
      <option value="Atendimento">Atendimento</option>
      <option value="Localização">Localização</option>
      <option value="Custo-benefício">Custo-benefício</option>
    </select>

    <label>Item avaliado</label>
    <input type="text" id="item" placeholder="Ex: Banheiros, Wi-Fi, Segurança">

    <label>Nota</label>
    <div class="estrelas" id="estrelas">
      <span class="estrela" data-nota="1">★</span>
      <span class="estrela" data-nota="2">★</span>
      <span class="estrela" data-nota="3">★</span>
      <span class="estrela" data-nota="4">★</span>
      <span class="estrela" data-nota="5">★</span>
    </div>

    <button id="salvar">Salvar Avaliação</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCFeqtsuT-4Q4e8EyrsEPRcIo3I6AmfEzE",
      authDomain: "exkombeiros-24a9a.firebaseapp.com",
      databaseURL: "https://exkombeiros-24a9a-default-rtdb.firebaseio.com",
      projectId: "exkombeiros-24a9a",
      storageBucket: "exkombeiros-24a9a.firebasestorage.app",
      messagingSenderId: "507759690855",
      appId: "1:507759690855:web:8a6ec18c9a98d7ee9900c2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let notaSelecionada = 0;
    
    document.querySelectorAll('.estrela').forEach(estrela => {
      estrela.onclick = () => {
        notaSelecionada = parseInt(estrela.dataset.nota);
        document.querySelectorAll('.estrela').forEach((e, i) => {
          e.classList.toggle('ativa', i < notaSelecionada);
        });
      }
    });

    document.getElementById('salvar').onclick = async () => {
      const camping = document.getElementById('camping').value.trim();
      const item = document.getElementById('item').value.trim();
      
      if (!camping || !item || notaSelecionada === 0) {
        alert('Preencha todos os campos e escolha uma nota');
        return;
      }

      const btn = document.getElementById('salvar');
      btn.disabled = true;
      btn.textContent = 'Salvando...';

      try {
        await push(ref(db, 'avaliacoes'), {
          camping: camping,
          categoria: document.getElementById('categoria').value,
          item: item,
          nota: notaSelecionada,
          avaliador: document.getElementById('avaliador').value,
          data: new Date().toISOString()
        });

        document.getElementById('sucesso').style.display = 'block';
        document.getElementById('camping').value = '';
        document.getElementById('item').value = '';
        notaSelecionada = 0;
        document.querySelectorAll('.estrela').forEach(e => e.classList.remove('ativa'));
        setTimeout(() => document.getElementById('sucesso').style.display = 'none', 3000);
      } catch (error) {
        alert('Erro ao salvar. Verifique as regras do Firebase.');
      }
      
      btn.disabled = false;
      btn.textContent = 'Salvar Avaliação';
    };
  </script>
</body>
</html>
