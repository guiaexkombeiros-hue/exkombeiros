<!-- ===========================
  ARQUIVO 1: index.html (Admin)
=========================== -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guia Exkombeiros - Admin</title>
  <style>
    body {
      font-family: serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #1b3d2f;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    .contadores {
      display: flex;
      justify-content: space-around;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    form {
      background-color: #fff;
      padding: 1rem;
      margin: 1rem;
      border-radius: 8px;
    }
    label {
      display: block;
      margin-top: 0.5rem;
    }
    input, select, textarea {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.2rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background-color: #1b3d2f;
      color: #fff;
      border: none;
      padding: 0.7rem;
      margin-top: 1rem;
      width: 100%;
      border-radius: 4px;
      font-size: 1rem;
    }
    .mensagem {
      text-align: center;
      margin-top: 1rem;
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>Guia Exkombeiros - Admin</h1>
    <div class="contadores">
      <div id="contadorCampings">Campings: 0</div>
      <div id="contadorScore">Score Médio: 0</div>
      <div id="contadorEstados">Estados: 0</div>
    </div>
  </header>

  <form id="campingForm">
    <label>Nome</label>
    <input type="text" id="nome" required>
    <label>Cidade</label>
    <input type="text" id="cidade" required>
    <label>Estado</label>
    <input type="text" id="estado" required>
    <label>Foto URL</label>
    <input type="url" id="foto" required>
    <label>Nota Geral</label>
    <input type="number" step="0.1" id="nota" required>
    <label>Banheiros</label>
    <input type="text" id="banheiros">
    <label>Chuveiro</label>
    <input type="text" id="chuveiro">
    <label>Limpeza</label>
    <input type="text" id="limpeza">
    <label>Privacidade</label>
    <input type="text" id="privacidade">
    <button type="submit">Salvar</button>
  </form>

  <div class="mensagem" id="mensagem"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, push, serverTimestamp, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "COLE_AQUI_SUA_API_KEY",
      authDomain: "COLE_AQUI_SEU_AUTH_DOMAIN",
      databaseURL: "COLE_AQUI_SUA_DATABASE_URL",
      projectId: "COLE_AQUI_SEU_PROJECT_ID",
      storageBucket: "COLE_AQUI_SEU_STORAGE_BUCKET",
      messagingSenderId: "COLE_AQUI_SEU_SENDER_ID",
      appId: "COLE_AQUI_SEU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const form = document.getElementById('campingForm');
    const mensagem = document.getElementById('mensagem');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const camping = {
        nome: document.getElementById('nome').value,
        cidade: document.getElementById('cidade').value,
        estado: document.getElementById('estado').value,
        foto: document.getElementById('foto').value,
        nota: parseFloat(document.getElementById('nota').value),
        banheiros: document.getElementById('banheiros').value,
        chuveiro: document.getElementById('chuveiro').value,
        limpeza: document.getElementById('limpeza').value,
        privacidade: document.getElementById('privacidade').value,
        timestamp: serverTimestamp()
      };
      push(ref(db, 'campings'), camping).then(() => {
        mensagem.textContent = "Camping salvo com sucesso";
        form.reset();
      });
    });

    const campingsRef = ref(db, 'campings');
    onValue(campingsRef, (snapshot) => {
      const data = snapshot.val();
      if (data) {
        const campings = Object.values(data);
        document.getElementById('contadorCampings').textContent = "Campings: " + campings.length;
        const media = campings.reduce((acc, c) => acc + c.nota, 0) / campings.length;
        document.getElementById('contadorScore').textContent = "Score Médio: " + media.toFixed(1);
        const estados = new Set(campings.map(c => c.estado));
        document.getElementById('contadorEstados').textContent = "Estados: " + estados.size;
      }
    });
  </script>
</body>
</html>
