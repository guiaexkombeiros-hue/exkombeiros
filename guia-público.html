<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guia Exkombeiros - Melhores Campings</title>
  <style>
    /* SEU CSS ORIGINAL DO GUIA-PUBLICO.HTML */
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 15px; background: #f0f0f0; }
    h1 { color: #1B5E20; text-align: center; margin-bottom: 10px; }
   .subtitulo { text-align: center; color: #666; margin-bottom: 25px; }
   .camping { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
   .cabecalho { display: flex; justify-content: space-between; align-items: start; flex-wrap: wrap; gap: 10px; }
   .nome { font-size: 24px; font-weight: bold; color: #1B5E20; }
   .local { color: #666; font-size: 14px; margin: 5px 0; }
   .contato { color: #1976D2; font-size: 14px; margin: 5px 0; }
   .preco { background: #FFF3E0; color: #E65100; padding: 5px 10px; border-radius: 6px; font-size: 14px; display: inline-block; margin: 5px 0; }
   .nota-principal { font-size: 32px; color: #FFC107; font-weight: bold; }
   .nota-numero { font-size: 18px; color: #F57C00; }
   .total-av { font-size: 13px; color: #999; }
   .categorias { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 15px 0; }
   .cat { background: #E8F5E9; padding: 10px; border-radius: 8px; text-align: center; }
   .cat-nome { font-size: 12px; color: #2E7D32; font-weight: bold; }
   .cat-nota { font-size: 18px; color: #1B5E20; margin-top: 3px; }
   .obs { background: #F5F5F5; padding: 12px; border-radius: 8px; margin-top: 15px; font-size: 14px; border-left: 4px solid #4CAF50; }
   .obs-titulo { font-weight: bold; color: #2E7D32; margin-bottom: 5px; }
   .tecnico { background: #E3F2FD; padding: 12px; border-radius: 8px; margin: 10px 0; font-size: 13px; }
   .tecnico-titulo { font-weight: bold; color: #1565C0; margin-bottom: 8px; }
   .tecnico-item { margin: 4px 0; }
   .carregando { text-align: center; padding: 60px 20px; color: #666; }
   .vazio { text-align: center; padding: 60px 20px; color: #999; }
  </style>
</head>
<body>
  <h1>🏕️ Guia Exkombeiros</h1>
  <p class="subtitulo">Ranking atualizado em tempo real pelos Exkombeiros</p>
  <div id="lista"><div class="carregando">Carregando campings avaliados...</div></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCFeqtsuT-4Q4e8EyrsEPRcIo3I6AmfEzE",
      authDomain: "exkombeiros-24a9a.firebaseapp.com",
      databaseURL: "https://exkombeiros-24a9a-default-rtdb.firebaseio.com",
      projectId: "exkombeiros-24a9a",
      storageBucket: "exkombeiros-24a9a.firebasestorage.app",
      messagingSenderId: "507759690855",
      appId: "1:507759690855:web:8a6ec18c9a98d7ee9900c2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'avaliacoes'), (snapshot) => {
      const dados = snapshot.val();
      if (!dados) {
        document.getElementById('lista').innerHTML = '<div class="vazio">Nenhum camping avaliado ainda.<br>Volte em breve!</div>';
        return;
      }

      const campings = {};
      Object.values(dados).forEach(av => {
        const nomeChave = av.camping.nome;
        if (!campings[nomeChave]) {
          campings[nomeChave] = {
            info: av.camping,
            acesso: av.acesso || {},
            tecnico: av.tecnico || {},
            avaliacoes: []
          };
        }
        campings[nomeChave].avaliacoes.push(av);
      });

      const ranking = Object.entries(campings).map(([nome, dados]) => {
        const mediaGeral = dados.avaliacoes.reduce((a, b) => a + b.notaFinal, 0) / dados.avaliacoes.length;
        return {
          nome,
          info: dados.info,
          acesso: dados.acesso,
          tecnico: dados.tecnico,
          mediaGeral,
          totalAv: dados.avaliacoes.length,
          observacoes: dados.avaliacoes.map(a => a.obs).filter(o => o).slice(-2)
        };
      }).sort((a, b) => b.mediaGeral - a.mediaGeral);

      document.getElementById('lista').innerHTML = ranking.map(c => {
        const estrelas = '★'.repeat(Math.round(c.mediaGeral)) + '☆'.repeat(5 - Math.round(c.mediaGeral));
        
        const tecnicoHTML = `
          <div class="tecnico">
            <div class="tecnico-titulo">⚡ Dados Técnicos</div>
            <div class="tecnico-item"><strong>Elétrica:</strong> ${c.tecnico.eletrica || 'N/I'} | <strong>Tensão:</strong> ${c.tecnico.tensao || 'N/I'}</div>
            <div class="tecnico-item"><strong>Medições:</strong> Chegada ${c.tecnico.medicao1 || '-'} | Pico ${c.tecnico.medicao2 || '-'} | Noite ${c.tecnico.medicao3 || '-'}</div>
            <div class="tecnico-item"><strong>Estrada:</strong> ${c.acesso.estrada || 'N/I'} | <strong>Trailer:</strong> ${c.acesso.cabeTrailer || 'N/I'} | <strong>Manobra:</strong> ${c.acesso.manobra || 'N/I'}</div>
            <div class="tecnico-item"><strong>Piso Trailer:</strong> ${c.acesso.pisoTrailer || 'N/I'} | <strong>Piso Barraca:</strong> ${c.acesso.pisoBarraca || 'N/I'}</div>
          </div>
        `;

        const obsHTML = c.observacoes.length > 0? `
          <div class="obs">
            <div class="obs-titulo">💬 Comentários recentes:</div>
            ${c.observacoes.map(o => `<div>• ${o}</div>`).join('')}
          </div>
        ` : '';

        return `
          <div class="camping">
            <div class="cabecalho">
              <div>
                <div class="nome">${c.nome}</div>
                <div class="local">📍 ${c.info.cidade || ''} - ${c.info.estado || ''}</div>
                ${c.info.telefone? `<div class="contato">📞 ${c.info.telefone}</div>` : ''}
                ${c.info.preco? `<div class="preco">${c.info.preco}</div>` : ''}
                ${c.info.gps? `<div class="contato">📍 GPS: ${c.info.gps}</div>` : ''}
              </div>
              <div style="text-align: right;">
                <div class="nota-principal">${estrelas}</div>
                <div class="nota-numero">${c.mediaGeral.toFixed(1)} / 5.0</div>
                <div class="total-av">${c.totalAv} avaliação${c.totalAv > 1? 'ões' : ''}</div>
              </div>
            </div>
            ${tecnicoHTML}
            ${obsHTML}
          </div>
        `;
      }).join('');
    });
  </script>
</body>
</html>
