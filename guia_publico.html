<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="light">
  <title>Guia Exkombeiros - Melhores Campings</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

  <style>
    :root {
      --primary: #1b3d2f;
      --accent: #d4af37;
      --bg: #eae6df;
      --card-bg: #ffffff;
      --text: #1b3d2f;
      --text-muted: #6b7280;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background-color: var(--bg); color: var(--text); line-height: 1.6; }
    
    .header { background-color: var(--primary); color: white; padding: 40px 20px; text-align: center; border-bottom: 3px solid var(--accent); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .logo { max-width: 180px; margin-bottom: 15px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
    .header h1 { font-family: 'Cinzel', serif; font-size: 22px; letter-spacing: 1px; margin-bottom: 5px; }
    .header p { font-size: 14px; color: #a3bdae; font-weight: 500; }

    .search-container { position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 15px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .search-box { background: white; border-radius: 15px; display: flex; align-items: center; padding: 5px 15px; border: 2px solid transparent; transition: all 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .search-box:focus-within { border-color: var(--accent); }
    .search-input { border: none; outline: none; padding: 10px; width: 100%; font-size: 15px; color: var(--text); }

    .filters { display: flex; gap: 10px; padding: 0 20px 15px 20px; overflow-x: auto; scrollbar-width: none; }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn { background: white; border: 1px solid #e5e7eb; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; color: var(--text-muted); transition: all 0.2s; }
    .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .camping-list { display: grid; gap: 20px; }
    
    .camping-card { background: var(--card-bg); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 25px rgba(27,61,47,0.08); transition: transform 0.2s; border: 1px solid rgba(27,61,47,0.05); position: relative; }
    .camping-card:active { transform: scale(0.98); }
    
    .card-content { padding: 20px; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .card-title { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; color: var(--primary); flex: 1; margin-right: 10px; }
    .card-score { background: var(--primary); color: var(--accent); font-family: 'Cinzel', serif; font-weight: 700; padding: 6px 12px; border-radius: 12px; font-size: 16px; display: flex; align-items: center; gap: 5px; }
    
    .card-info { display: flex; flex-direction: column; gap: 5px; }
    .info-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); font-weight: 500; }
    .info-item i { font-style: normal; font-size: 16px; }
    
    .card-footer { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
    .location-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; color: var(--accent); }
    
    .stats-summary { display: flex; justify-content: space-around; background: white; margin: -30px 20px 20px 20px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); position: relative; z-index: 10; border-bottom: 4px solid var(--accent); }
    .stat-item { text-align: center; }
    .stat-val { display: block; font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; color: var(--primary); }
    .stat-lbl { font-size: 10px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; }

    .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
    .empty-state i { font-size: 40px; display: block; margin-bottom: 10px; }

    footer { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 12px; font-weight: 500; }
    .highlight { color: var(--accent); font-weight: 700; }
  </style>
</head>
<body>

  <header class="header">
    <img src="5C4B6FA5-8E68-483A-A638-22B78B7764DD.png" alt="Guia Exkombeiros" class="logo">
    <h1>GUIA EXKOMBEIROS</h1>
    <p>Os melhores campings para você!</p>
  </header>

  <div class="stats-summary">
    <div class="stat-item"><span class="stat-val" id="total-campings">0</span><span class="stat-lbl">Campings</span></div>
    <div class="stat-item"><span class="stat-val" id="total-estados">0</span><span class="stat-lbl">Estados</span></div>
    <div class="stat-item"><span class="stat-val" id="media-geral">0.0</span><span class="stat-lbl">Nota Média</span></div>
  </div>

  <div class="search-container">
    <div class="search-box">
      <i>🔍</i>
      <input type="text" id="search-input" class="search-input" placeholder="Buscar por nome, cidade ou estado..." oninput="filtrarCampings()">
    </div>
  </div>

  <div class="filters" id="state-filters">
    <button class="filter-btn active" onclick="filtrarPorEstado('todos', this)">Todos</button>
  </div>

  <main class="container">
    <div class="camping-list" id="camping-list">
      <div class="empty-state">Carregando guia...</div>
    </div>
  </main>

  <footer>
    <p>© 2026 Guia <span class="highlight">Exkombeiros</span></p>
    <p>Avaliado por Rogério e Viviane</p>
  </footer>

  <script>
    // Configurações Firebase (Mesmas do Admin para sincronizar)
    const firebaseConfig = {
      apiKey: "AIzaSyCFeqtsuT-4Q4e8EyrsEPRcIo3I6AmfEzE",
      authDomain: "exkombeiros-24a9a.firebaseapp.com",
      databaseURL: "https://exkombeiros-24a9a-default-rtdb.firebaseio.com",
      projectId: "exkombeiros-24a9a",
      storageBucket: "exkombeiros-24a9a.firebasestorage.app",
      messagingSenderId: "507759690855",
      appId: "1:507759690855:web:8a6ec18c9a98d7ee9900c2"
    };

    let allCampings = [];
    let currentFilter = 'todos';

    function init() {
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
      
      db.ref('campings').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        allCampings = Object.keys(data).map(key => ({
          id: key,
          ...data[key]
        })).sort((a, b) => (parseFloat(b.nota) || 0) - (parseFloat(a.nota) || 0));
        
        atualizarStats();
        gerarFiltrosEstados();
        renderizarLista(allCampings);
      });
    }

    function atualizarStats() {
      document.getElementById('total-campings').innerText = allCampings.length;
      const estados = new Set(allCampings.map(c => c.estado).filter(e => e));
      document.getElementById('total-estados').innerText = estados.size;
      
      const soma = allCampings.reduce((acc, c) => acc + (parseFloat(c.nota) || 0), 0);
      const media = allCampings.length > 0 ? (soma / allCampings.length).toFixed(1) : "0.0";
      document.getElementById('media-geral').innerText = media;
    }

    function gerarFiltrosEstados() {
      const container = document.getElementById('state-filters');
      const estados = [...new Set(allCampings.map(c => c.estado).filter(e => e))].sort();
      
      let html = '<button class="filter-btn ' + (currentFilter === 'todos' ? 'active' : '') + '" onclick="filtrarPorEstado(\'todos\', this)">Todos</button>';
      estados.forEach(est => {
        html += `<button class="filter-btn ${currentFilter === est ? 'active' : ''}" onclick="filtrarPorEstado('${est}', this)">${est}</button>`;
      });
      container.innerHTML = html;
    }

    function renderizarLista(lista) {
      const container = document.getElementById('camping-list');
      if (lista.length === 0) {
        container.innerHTML = '<div class="empty-state"><i>🏜️</i>Nenhum camping encontrado para esta busca.</div>';
        return;
      }

      let html = "";
      lista.forEach(c => {
        html += `
          <div class="camping-card">
            <div class="card-content">
              <div class="card-header">
                <h2 class="card-title">${c.nome}</h2>
                <div class="card-score"><span>★</span>${parseFloat(c.nota || 0).toFixed(1)}</div>
              </div>
              <div class="card-info">
                <div class="info-item"><i>📍</i> ${c.cidade || 'Cidade não informada'} - ${c.estado || 'UF'}</div>
                ${c.observacoes ? `<div class="info-item"><i>📝</i> ${c.observacoes}</div>` : ''}
              </div>
              <div class="card-footer">
                <span class="location-tag">${c.estado || ''}</span>
                <span style="font-size: 10px; color: #9ca3af;">Verificado pelo Guia</span>
              </div>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function filtrarCampings() {
      const termo = document.getElementById('search-input').value.toLowerCase();
      const filtrados = allCampings.filter(c => {
        const matchesSearch = (c.nome || "").toLowerCase().includes(termo) || 
                             (c.cidade || "").toLowerCase().includes(termo) || 
                             (c.estado || "").toLowerCase().includes(termo);
        const matchesState = currentFilter === 'todos' || c.estado === currentFilter;
        return matchesSearch && matchesState;
      });
      renderizarLista(filtrados);
    }

    function filtrarPorEstado(estado, btn) {
      currentFilter = estado;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filtrarCampings();
    }

    window.onload = init;
  </script>
</body>
</html>
