=========================== -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guia Exkombeiros - Público</title>
  <style>
    body {
      font-family: serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #1b3d2f;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    .contadores {
      display: flex;
      justify-content: space-around;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    .search-bar {
      position: relative !important;
      z-index: 10;
      padding: 0.5rem;
      background-color: #fff;
    }
    .search-bar input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .content {
      padding: 1rem;
      margin-bottom: 3rem;
    }
    .camping-card {
      background-color: #fff;
      margin-bottom: 1rem;
      padding: 1rem;
      border-radius: 8px;
      cursor: pointer;
    }
    .camping-card img {
      max-width: 100%;
      border-radius: 4px;
    }
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background-color: #1b3d2f;
      color: #fff;
      display: flex;
      justify-content: space-around;
      padding: 0.5rem;
    }
    footer div {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <h1>Guia Exkombeiros</h1>
    <div class="contadores">
      <div id="contadorCampings">Campings: 0</div>
      <div id="contadorScore">Score Médio: 0</div>
      <div id="contadorEstados">Estados: 0</div>
    </div>
  </header>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Buscar por nome ou cidade...">
  </div>

  <div class="content" id="content"></div>

  <footer>
    <div id="tabInicio">INÍCIO</div>
    <div id="tabFicha">FICHA</div>
    <div id="tabRanking">RANKING</div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "COLE_AQUI_SUA_API_KEY",
      authDomain: "COLE_AQUI_SEU_AUTH_DOMAIN",
      databaseURL: "COLE_AQUI_SEU_DATABASE_URL",
      projectId: "COLE_AQUI_SEU_PROJECT_ID",
      storageBucket: "COLE_AQUI_SEU_STORAGE_BUCKET",
      messagingSenderId: "COLE_AQUI_SEU_SENDER_ID",
      appId: "COLE_AQUI_SEU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const campingsRef = ref(db, 'campings');
    let campingsData = {};
    let currentCamping = null;

    const contentDiv = document.getElementById('content');
    const searchInput = document.getElementById('searchInput');

    function renderInicio() {
      contentDiv.innerHTML = '';
      const filtro = searchInput.value.toLowerCase();
      Object.entries(campingsData).forEach(([id, c]) => {
        if (c.nome.toLowerCase().includes(filtro) || c.cidade.toLowerCase().includes(filtro)) {
          const card = document.createElement('div');
          card.className = 'camping-card';
          card.innerHTML = `
            <h3>${c.nome}</h3>
            <p>${c.cidade} - ${c.estado}</p>
            <img src="${c.foto}" alt="${c.nome}">
            <p>Nota: ${c.nota}</p>
          `;
          card.onclick = () => {
            currentCamping = c;
            renderFicha();
          };
          contentDiv.appendChild(card);
        }
      });
    }

    function renderFicha() {
      if (!currentCamping) return;
      contentDiv.innerHTML = `
        <h2>${currentCamping.nome}</h2>
        <img src="${currentCamping.foto}" alt="${currentCamping.nome}">
        <p><strong>Cidade:</strong> ${currentCamping.cidade}</p>
        <p><strong>Estado:</strong> ${currentCamping.estado}</p>
        <p><strong>Nota:</strong> ${currentCamping.nota}</p>
        <p><strong>Banheiros:</strong> ${currentCamping.banheiros}</p>
        <p><strong>Chuveiro:</strong> ${currentCamping.chuveiro}</p>
        <p><strong>Limpeza:</strong> ${currentCamping.limpeza}</p>
        <p><strong>Privacidade:</strong> ${currentCamping.privacidade}</p>
      `;
    }

    function renderRanking() {
      contentDiv.innerHTML = '';
      const campingsOrdenados = Object.values(campingsData).sort((a, b) => b.nota - a.nota);
      campingsOrdenados.forEach(c => {
        const card = document.createElement('div');
        card.className = 'camping-card';
        card.innerHTML = `
          <h3>${c.nome}</h3>
          <p>${c.cidade} - ${c.estado}</p>
          <p>Nota: ${c.nota}</p>
        `;
        card.onclick = () => {
          currentCamping = c;
          renderFicha();
        };
        contentDiv.appendChild(card);
      });
    }

    document.getElementById('tabInicio').onclick = renderInicio;
    document.getElementById('tabFicha').onclick = renderFicha;
    document.getElementById('tabRanking').onclick = renderRanking;
    searchInput.oninput = renderInicio;

    onValue(campingsRef, (snapshot) => {
      campingsData = snapshot.val() || {};
      const campings = Object.values(campingsData);
      document.getElementById('contadorCampings').textContent = "Campings: " + campings.length;
      if (campings.length > 0) {
        const media = campings.reduce((acc, c) => acc + c.nota, 0) / campings.length;
        document.getElementById('contadorScore').textContent = "Score Médio: " + media.toFixed(1);
        const estados = new Set(campings.map(c => c.estado));
        document.getElementById('contadorEstados').textContent = "Estados: " + estados.size;
      } else {
        document.getElementById('contadorScore').textContent = "Score Médio: 0";
        document.getElementById('contadorEstados').textContent = "Estados: 0";
      }
      renderInicio();
    });
  </script>
</body>
</html>
