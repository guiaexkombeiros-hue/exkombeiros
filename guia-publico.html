<body>

  <!-- Cabeçalho Principal -->
  <header>
    <div class="container" style="padding: 0;">
      <h1>Ranking de <span>Campings</span></h1>
      <p>Comunidade Exkombeiros</p>
      
      <!-- Contadores Administrativos -->
      <div class="stats-container">
        <div class="stat-box">
          <span class="stat-label">Total</span>
          <span id="stat-campings" class="stat-val">0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Média Geral</span>
          <span id="stat-score" class="stat-val">0.0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Estados</span>
          <span id="stat-estados" class="stat-val">0</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Telas do Aplicativo -->
  <main class="container">
    
    <!-- TELA 1: INÍCIO (Lista e Busca) -->
    <section id="tela-inicio">
      <div class="search-card">
        <span>🔍</span>
        <input type="text" id="busca-input" oninput="filtrarCampings()" placeholder="Procurar por nome ou localidade..." class="search-field">
      </div>

      <div id="lista-campings">
        <div style="text-align: center; padding: 40px; color: #6b7280;">Carregando dados da nuvem...</div>
      </div>
    </section>

    <!-- TELA 2: FICHA DETALHADA -->
    <section id="tela-ficha" class="hidden">
      <button onclick="mudarTela('inicio')" class="btn-return">
        ← Voltar à Lista
      </button>

      <div id="detalhe-container">
        <div style="text-align: center; padding: 40px; color: #6b7280;">Escolha um camping na lista para exibir seus detalhes.</div>
      </div>
    </section>

    <!-- TELA 3: RANKING -->
    <section id="tela-ranking" class="hidden">
      <div class="rank-card">
        <h2 class="rank-header"><span>🏆</span> Classificação Oficial</h2>
        <div id="rank-list" class="rank-list">
          <!-- Inserido via Firebase -->
        </div>
      </div>
    </section>

  </main>

  <!-- Menu do Rodapé -->
  <nav>
    <div class="nav-wrapper">
      <button onclick="mudarTela('inicio')" id="btn-inicio" class="nav-btn active">
        <span class="nav-btn-icon">🏕️</span>
        <span class="nav-btn-text">Início</span>
      </button>
      <button onclick="mudarTela('ficha')" id="btn-ficha" class="nav-btn">
        <span class="nav-btn-icon">📋</span>
        <span class="nav-btn-text">Ficha</span>
      </button>
      <button onclick="mudarTela('ranking')" id="btn-ranking" class="nav-btn">
        <span class="nav-btn-icon">🏆</span>
        <span class="nav-btn-text">Ranking</span>
      </button>
    </div>
  </nav>

  <!-- Script Firebase Realtime Segurado -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // Modifique com as suas credenciais oficiais do console Firebase
    const firebaseConfig = {
      apiKey: "COLE_AQUI_SUA_API_KEY",
      authDomain: "COLE_AQUI_SEU_AUTH_DOMAIN",
      databaseURL: "COLE_AQUI_SUA_DATABASE_URL",
      projectId: "COLE_AQUI_SEU_PROJECT_ID",
      storageBucket: "COLE_AQUI_SEU_STORAGE_BUCKET",
      messagingSenderId: "COLE_AQUI_SEU_SENDER_ID",
      appId: "COLE_AQUI_SEU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'campings');

    window.campingsCache = [];

    // Carregamento e Monitoramento em Tempo Real
    onValue(dbRef, (snapshot) => {
      const data = snapshot.val();
      if (data) {
        window.campingsCache = Object.keys(data).map(key => ({
          id: key,
          ...data[key]
        }));
        
        atualizarContadores();
        renderizarInicio();
        renderizarRanking();
      } else {
        document.getElementById('lista-campings').innerHTML = `
          <div style="text-align: center; padding: 40px; color: #6b7280;">Nenhum camping registrado de momento.</div>
        `;
        document.getElementById('rank-list').innerHTML = `
          <div style="text-align: center; padding: 20px; color: #6b7280;">Sem classificação de momento.</div>
        `;
      }
    });

    function atualizarContadores() {
      const campings = window.campingsCache;
      const total = campings.length;
      const sum = campings.reduce((acc, curr) => acc + (parseFloat(curr.nota) || 0), 0);
      const media = total > 0 ? (sum / total).toFixed(1) : "0.0";
      const estadosUnicos = new Set(campings.map(c => c.estado?.toUpperCase())).size;

      document.getElementById('stat-campings').innerText = total;
      document.getElementById('stat-score').innerText = media;
      document.getElementById('stat-estados').innerText = estadosUnicos;
    }

    // Compartilhar as funções de navegação globais
    window.mudarTela = mudarTela;
    window.filtrarCampings = filtrarCampings;
    window.abrirFicha = abrirFicha;
  </script>

  <!-- Lógica de Controle da Interface do Utilizador -->
  <script>
    function mudarTela(telaId) {
      document.getElementById('tela-inicio').classList.add('hidden');
      document.getElementById('tela-ficha').classList.add('hidden');
      document.getElementById('tela-ranking').classList.add('hidden');

      document.getElementById('btn-inicio').classList.remove('active');
      document.getElementById('btn-ficha').classList.remove('active');
      document.getElementById('btn-ranking').classList.remove('active');

      document.getElementById(`tela-${telaId}`).classList.remove('hidden');
      document.getElementById(`btn-${telaId}`).classList.add('active');

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderizarInicio(filtrados = null) {
      const items = filtrados || window.campingsCache;
      const container = document.getElementById('lista-campings');

      if (!items || items.length === 0) {
        container.innerHTML = `<div style="text-align: center; padding: 40px; color: #6b7280;">Nenhum resultado para a pesquisa.</div>`;
        return;
      }

      container.innerHTML = items.map(c => `
        <div class="camping-block" onclick="abrirFicha('${c.id}')">
          <div class="camping-img" style="background-image: url('${c.foto}')">
            <div class="score-badge">★ ${parseFloat(c.nota).toFixed(1)}</div>
          </div>
          <div class="camping-details">
            <div>
              <h3 class="camping-name">${c.nome}</h3>
              <p class="camping-location">📍 ${c.cidade} - ${c.estado}</p>
            </div>
            <div class="camping-pricing">
              <span class="pricing-lbl">Diária</span>
              <span class="pricing-val">R$ ${c.preco ? parseFloat(c.preco).toFixed(2) : '---'}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function filtrarCampings() {
      const valor = document.getElementById('busca-input').value.toLowerCase().trim();
      if (!valor) {
        renderizarInicio();
        return;
      }

      const filtrados = window.campingsCache.filter(c => 
        c.nome.toLowerCase().includes(valor) || 
        c.cidade.toLowerCase().includes(valor) || 
        c.estado.toLowerCase().includes(valor)
      );
      renderizarInicio(filtrados);
    }

    function renderizarRanking() {
      const ordenados = [...window.campingsCache].sort((a, b) => (b.nota || 0) - (a.nota || 0));
      const container = document.getElementById('rank-list');

      container.innerHTML = ordenados.map((c, index) => {
        let badgeClass = 'normal-rank';
        if (index === 0) badgeClass = 'gold-1';
        if (index === 1) badgeClass = 'silver-2';
        if (index === 2) badgeClass = 'bronze-3';

        return `
          <div class="rank-row" onclick="abrirFicha('${c.id}')">
            <span class="rank-badge ${badgeClass}">${index + 1}º</span>
            <span class="rank-name-txt">${c.nome} <span style="font-size: 11px; color:#6b7280; font-weight: normal;">(${c.cidade} - ${c.estado})</span></span>
            <span class="rank-score-txt">${parseFloat(c.nota).toFixed(1)}</span>
          </div>
        `;
      }).join('');
    }

    function abrirFicha(id) {
      const camping = window.campingsCache.find(c => c.id === id);
      if (!camping) return;

      const container = document.getElementById('detalhe-container');
      container.innerHTML = `
        <div class="profile-card">
          <!-- Banner -->
          <div class="profile-banner" style="background-image: url('${camping.foto}')">
            <div class="profile-overlay"></div>
            <div class="profile-title-container">
              <p>${camping.cidade} - ${camping.estado}</p>
              <h2>${camping.nome}</h2>
            </div>
            <div class="score-badge" style="top:16px; right:16px;">★ ${parseFloat(camping.nota).toFixed(1)}</div>
          </div>

          <!-- Conteúdo -->
          <div class="profile-content">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eae6df; padding-bottom:12px; margin-bottom:12px;">
              <div>
                <span class="pricing-lbl" style="display:block;">Preço Estimado</span>
                <span class="pricing-val" style="font-size:18px;">R$ ${camping.preco ? parseFloat(camping.preco).toFixed(2) : 'Sob consulta'}</span>
              </div>
              <span style="font-size:11px; color:#0f5132; background-color:#d1e7dd; padding:6px 12px; border-radius:20px; font-weight:700;">✓ Verificado</span>
            </div>

            <h3 class="profile-specs-header">Infraestrutura Técnica</h3>

            <!-- Energia -->
            <div class="tech-spec-box">
              <span class="tech-spec-title">⚡ Energia Elétrica</span>
              <div class="tech-spec-grid">
                <div>Tensão: <span class="tech-spec-val">${camping.energia_tensao || 'N/A'}</span></div>
                <div>Estabilidade: <span class="tech-spec-val">${camping.energia_estabilidade || 'N/A'}</span></div>
                <div style="grid-column: span 2;">Amperagem: <span class="tech-spec-val">${camping.energia_amperagem || 'N/A'}</span></div>
              </div>
            </div>

            <!-- Banheiros -->
            <div class="tech-spec-box">
              <span class="tech-spec-title">🚿 Banheiros & Chuveiro</span>
              <div class="tech-spec-grid">
                <div>Área Seca: <span class="tech-spec-val">${camping.banheiro_seco || 'N/A'}</span></div>
                <div>Proporção: <span class="tech-spec-val">${camping.banheiro_proporcao || 'N/A'}</span></div>
                <div>Água Quente: <span class="tech-spec-val">${camping.banheiro_quente || 'N/A'}</span></div>
                <div>Limpeza: <span class="tech-spec-val">${camping.banheiro_limpeza || 'N/A'}</span></div>
              </div>
            </div>

            <!-- Acesso -->
            <div class="tech-spec-box">
              <span class="tech-spec-title">🚗 Estrada e Acesso</span>
              <div class="tech-spec-grid">
                <div>Estrada: <span class="tech-spec-val">${camping.acesso_estrada || 'N/A'}</span></div>
                <div>Trailer: <span class="tech-spec-val">${camping.acesso_trailer || 'N/A'}</span></div>
                <div style="grid-column: span 2;">Terreno: <span class="tech-spec-val">${camping.acesso_nivel || 'N/A'}</span></div>
              </div>
            </div>

            <!-- Conectividade -->
            <div class="tech-spec-box">
              <span class="tech-spec-title">📶 Conectividade</span>
              <div class="tech-spec-grid">
                <div>Sinal Celular: <span class="tech-spec-val">${camping.conec_sinal || 'N/A'}</span></div>
                <div>Wi-Fi: <span class="tech-spec-val">${camping.conec_wifi || 'N/A'}</span></div>
              </div>
            </div>

            <!-- Cozinha e Outros -->
            <div class="tech-spec-box">
              <span class="tech-spec-title">🍳 Cozinha & Serviços</span>
              <div class="tech-spec-grid">
                <div>Cozinha: <span class="tech-spec-val">${camping.cozinha_geral || 'N/A'}</span></div>
                <div>Lixo: <span class="tech-spec-val">${camping.infra_lixo || 'N/A'}</span></div>
                <div style="grid-column: span 2;">Segurança: <span class="tech-spec-val">${camping.infra_seguranca || 'N/A'}</span></div>
              </div>
            </div>

          </div>
        </div>
      `;
