<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Exkombeiros">
<title>Guia Exkombeiros de Camping</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--v:#1a3a2a;--vm:#2d5a3d;--vc:#4a8c5c;--o:#c8a84b;--cr:#f5f0e8;--cz:#8a8a7a;--ok:#27ae60;--bad:#c0392b;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#e8e2d8;font-family:'DM Sans',sans-serif;color:#1a1a14;}
.hero{background:var(--v);color:var(--cr);padding:56px 22px 28px;position:relative;}
.hero h1{font-family:'Playfair Display',serif;font-weight:900;font-size:32px;line-height:1.1;letter-spacing:-1px;}
.hero p{font-size:12px;color:var(--o);text-transform:uppercase;letter-spacing:2px;margin-top:6px;font-weight:600;}
.desc{font-size:13px;color:#a8c3b0;line-height:1.5;margin-top:16px;max-width:340px;}
.stats{display:flex;gap:10px;margin-top:24px;}
.st-card{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px;text-align:center;}
.st-num{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:var(--o);}
.st-lbl{font-size:9px;color:var(--cz);text-transform:uppercase;}
.sm{max-width:500px;margin:0 auto;padding:16px;}
.cc{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;display:flex;justify-content:between;align-items:center;cursor:pointer;}
.c-inf h3{font-family:'Playfair Display',serif;font-weight:700;font-size:17px;color:var(--v);}
.c-inf p{font-size:11px;color:var(--cz);margin-top:2px;}
.sc-v{font-size:22px;font-weight:700;color:var(--o);line-height:1;}
.sc-l{font-size:9px;color:var(--cz);text-transform:uppercase;margin-top:2px;}
.modal{position:fixed;top:0;bottom:0;left:0;right:0;background:rgba(26,58,42,0.4);backdrop-filter:blur(4px);z-index:1000;opacity:0;pointer-events:none;transition:0.25s;padding:16px;display:flex;align-items:end;}
.modal.on{opacity:1;pointer-events:auto;}
.m-cnt{background:#fff;border-radius:16px;width:100%;max-width:460px;margin:0 auto;padding:24px;}
.m-hd{display:flex;justify-content:between;align-items:start;margin-bottom:16px;}
.m-hd h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--v);}
.m-sc{background:var(--cr);border-radius:10px;padding:10px 16px;text-align:center;}
.m-sc-v{font-size:24px;font-weight:900;color:var(--o);}
.mst{font-size:10px;font-weight:600;color:var(--cz);text-transform:uppercase;margin:16px 0 6px;}
.ng{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ng-i{background:#faf8f5;border-radius:8px;padding:8px 12px;display:flex;justify-content:between;align-items:center;}
.ng-t{font-size:11px;color:var(--v);}
.ng-v{font-size:13px;font-weight:700;color:var(--ok);}
.ng-v.bad{color:var(--bad);}
.mobs{font-size:12px;background:var(--cr);padding:10px 12px;border-radius:8px;font-style:italic;}
.close-btn{width:100%;background:var(--v);color:#fff;border:none;border-radius:8px;padding:12px;font-size:13px;font-weight:600;margin-top:20px;}
.yt-btn{display:block;width:100%;background:#c0392b;color:#fff;border:none;border-radius:8px;padding:12px;font-size:13px;font-weight:600;margin-top:8px;text-align:center;text-decoration:none;}
</style>
</head>
<body>
<div class="hero">
  <p>Guia Técnico Independente</p>
  <h1>Guia Exkombeiros<br>de Camping</h1>
  <div class="desc">Avaliações técnicas independentes por Rogério e Viviane.</div>
  <div class="stats">
    <div class="st-card"><div class="st-num" id="st-c">0</div><div class="st-lbl">Campings</div></div>
    <div class="st-card"><div class="st-num" id="st-m">0.0</div><div class="st-lbl">Média</div></div>
    <div class="st-card"><div class="st-num" id="st-e">0</div><div class="st-lbl">Estados</div></div>
  </div>
</div>
<div class="sm">
  <div id="lc"></div>
</div>

<div class="modal" id="modal" onclick="if(event.target==this)fM()">
  <div class="m-cnt">
    <div class="m-hd">
      <div><h2 id="m-n">-</h2><p id="m-c">-</p></div>
      <div class="m-sc"><div class="m-sc-v" id="m-s">0.0</div><div class="sc-l">Score</div></div>
    </div>
    <div id="mc"></div>
    <a id="m-yt" href="#" target="_blank" class="yt-btn" style="display:none;">▶ Ver Vídeo da Auditoria</a>
    <button class="close-btn" onclick="fM()">Fechar Avaliação</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { databaseURL: "https://guiaexkombeiros-default-rtdb.firebaseio.com/" };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let todos = [];

onValue(ref(db, 'campings'), (snapshot) => {
  if(!snapshot.exists()) return;
  let dados = snapshot.val();
  todos = Object.keys(dados).map(k => ({ id: k, ...dados[k] })).sort((a,b) => b.score - a.score);
  
  document.getElementById('st-c').innerText = todos.length;
  let soma = todos.reduce((acc, c) => acc + c.score, 0);
  document.getElementById('st-m').innerText = todos.length ? (soma / todos.length).toFixed(1) : '0.0';
  let ufs = todos.map(c => c.cidade ? c.cidade.split('-').pop().trim().toUpperCase() : 'MG');
  document.getElementById('st-e').innerText = [...new Set(ufs)].length;
  
  let container = document.getElementById('lc');
  container.innerHTML = '';
  todos.forEach((c, idx) => {
    let pfx = idx === 0 ? '🥇 ' : idx === 1 ? '🥈 ' : idx === 2 ? '🥉 ' : '';
    container.innerHTML += `<div class="cc" onclick="window.aF('${c.id}')">
      <div class="c-inf"><h3>${pfx}${c.nome}</h3><p>${c.cidade || ''}</p></div>
      <div class="c-sc"><div class="sc-v">${parseFloat(c.score).toFixed(1)}</div><div class="sc-l">Score</div></div>
    </div>`;
  });
});

window.aF = function(id) {
  let c = todos.find(item => item.id === id);
  if(!c) return;
  document.getElementById('m-n').innerText = c.nome;
  document.getElementById('m-c').innerText = c.cidade || '';
  document.getElementById('m-s').innerText = parseFloat(c.score).toFixed(1);
  
  let n = c.notas || { acessibilidade:{}, eletrica:{}, hidraulica:{} };
  let itens = [
    { t:'Altura Livre', v:n.acessibilidade.altura },
    { t:'Manobra e Giro', v:n.acessibilidade.manobra },
    { t:'Piso Firme', v:n.acessibilidade.piso },
    { t:'Tensão Estável', v:n.eletrica.tensao },
    { t:'Ar 9000 BTUs', v:n.eletrica.carga },
    { t:'Aterramento Real', v:n.eletrica.terra },
    { t:'Conservação Totem', v:n.eletrica.conservacao },
    { t:'Escoamento Box', v:n.hidraulica.box },
    { t:'Ganchos Suportes', v:n.hidraulica.suportes },
    { t:'Pressão Chuveiro', v:n.hidraulica.pressao }
  ];
  
  let no = itens.map(i => `<div class="ng-i"><span class="ng-t">${i.t}</span><span class="ng-v ${i.v?'':'bad'}">${i.v?'OK':'NÃO'}</span></div>`).join('');
  let inf = [(c.preco ? '💰 '+c.preco : null), (c.data ? '📅 '+c.data : null)].filter(Boolean).join(' · ');
  
  document.getElementById('mc').innerHTML = (inf ? '<p style="font-size:11px;color:#aaa;margin-bottom:12px;text-align:center;">'+inf+'</p>' : '') +
    '<div class="mst">📊 Notas Técnicas</div><div class="ng">' + no + '</div>' +
    (c.obs ? '<div class="mst">📝 Observações</div><div class="mobs">' + c.obs + '</div>' : '');
    
  let yt = document.getElementById('m-yt');
  if(c.youtube) { yt.href = c.youtube; yt.style.display = 'block'; } else { yt.style.display = 'none'; }
  document.getElementById('modal').classList.add('on');
}

window.fM = function() { document.getElementById('modal').classList.remove('on'); }
</script>
</body>
</html>
