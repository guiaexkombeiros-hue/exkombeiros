<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Exkombeiros">
<title>Guia Exkombeiros de Camping</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--v:#1a3a2a;--vm:#2d5a3d;--vc:#4a8c5c;--o:#c8a84b;--cr:#f5f0e8;--cz:#8a7a;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#e8e2d8;font-family:'DM Sans',sans-serif;color:#1a1a1a}
.hero{background:var(--v);color:var(--cr);padding:52px 22px 28px;position:relative;overflow:hidden}
.hero:before{content:'';position:absolute;top:-80px;right:-80px;width:320px;height:320px;border-radius:50%;border:1px solid rgba(200,168,75,.1)}
.lw{display:flex;align-items:center;gap:12px;margin-bottom:14px;position:relative}
.li{width:70px;height:70px;object-fit:contain;border-radius:50%;background:#fff;padding:3px;box-shadow:0 2px 10px rgba(0,0,0,.3);flex-shrink:0}
.badge{display:inline-block;border:1px solid var(--o);color:var(--o);font-size:9px;letter-spacing:3px;text-transform:uppercase;padding:3px 10px;margin-bottom:6px;border-radius:2px}
.hero h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;line-height:1.1}
.hero h1 em{color:var(--o)}
.hero p{font-size:11px;color:rgba(245,240,232,.5);line-height:1.6;margin:8px 0 16px}
.stats{display:flex;gap:18px}
.sn{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:var(--o);line-height:1}
.sl{font-size:9px;color:rgba(245,240,232,.4);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.sobre{background:#fff;padding:14px 22px;border-bottom:2px solid var(--o);font-size:12px;color:#666;line-height:1.6}
.sobre strong{color:var(--v)}
.rank{padding:12px 18px 80px}
.rt{font-size:11px;color:var(--cz);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;font-family:'Playfair Display',serif}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 14px rgba(0,0,0,.07);margin-bottom:10px;overflow:hidden}
.ct{padding:12px 14px 8px}
.cl{display:flex;align-items:flex-start;gap:9px}
.cp{font-family:'Playfair Display',serif;font-size:19px;font-weight:900;color:var(--o);min-width:30px;line-height:1;padding-top:2px}
.cn{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--v);line-height:1.2;margin-bottom:2px}
.clo{font-size:10px;color:var(--cz)}
.csc{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--v);line-height:1}
.css{font-size:9px;color:#ccc;text-align:right}
.ce{font-size:11px;letter-spacing:2px;padding:4px 14px 7px;border-top:1px solid #f5}
.ca{display:flex;gap:6px;padding:7px 14px 12px;border-top:1px solid #f5f5}
.byt{flex:2;padding:9px;background:var(--v);color:#fff;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer}
.bv{flex:1;padding:9px;background:#f0f5f2;color:var(--v);border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer}
.vz{text-align:center;padding:48px 18px;color:#aaa}
.vz-i{font-size:42px;margin-bottom:10px}
.vz h3{font-family:'Playfair Display',serif;font-size:17px;color:var(--v);margin-bottom:5px}
.vz p{font-size:11px;line-height:1.6}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;overflow-y:auto;padding:14px}
.modal.on{display:flex;align-items:flex-start;justify-content:center}
.mbox{background:#fff;max-width:520px;width:100%;border-radius:14px;overflow:hidden;margin:auto}
.mh{background:var(--v);color:var(--cr);padding:18px 20px}
.mh h2{font-family:'Playfair Display',serif;font-size:17px;margin-bottom:1px}
.msc{font-family:'Playfair Display',serif;font-size:36px;font-weight:900;color:var(--o);line-height:1;margin-top:8px}
.mbody{padding:16px 20px;max-height:56vh;overflow-y:auto;font-size:13px;line-height:1.7;color:#333}
.mbody h3{font-family:'Playfair Display',serif;font-size:14px;color:var(--v);margin:16px 0 6px}
.mbody h3:first-child{margin-top:0}
.mf{padding:12px 20px;background:#f9f9f9;border-top:1px solid #eee;display:flex;gap:7px}
.bfc{flex:1;padding:11px;background:#eee;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.bfyt{flex:2;padding:11px;background:var(--v);color:#fff;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
</style>
</head>
