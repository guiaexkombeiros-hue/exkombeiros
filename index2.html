<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia Exkombeiros - Painel do Administrador</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: Georgia, serif; background: #f5f5f5; }
.header { background: #1a472a; color: white; padding: 30px 20px; text-align: center; }
.header h1 { font-size: 36px; font-weight: normal; margin-bottom: 5px; }
.header h1 em { font-style: italic; }
.header p { font-size: 12px; letter-spacing: 2px; opacity: 0.8; }
.stats { display: flex; justify-content: center; gap: 60px; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); }
.stat { text-align: center; }
.stat-label { font-size: 11px; letter-spacing: 1px; opacity: 0.7; margin-bottom: 5px; }
.stat-value { font-size: 32px; color: #d4af37; }
.container { max-width: 800px; margin: 0 auto; padding: 20px; }
.section-card { background: #1a472a; border-radius: 12px; padding: 20px; margin: 20px 0; color: white; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.2); }
.section-title { font-size: 18px; display: flex; align-items: center; gap: 10px; }
.peso-badge { background: #d4af37; color: #1a472a; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
.item-card { background: white; border-radius: 8px; padding: 15px; margin: 10px 0; }
.item-label { color: #333; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-opcao { flex: 1; min-width: 100px; padding: 12px 8px; font-size: 13px; border: 2px solid #ddd; border-radius: 6px; background: white; cursor: pointer; color: #333; transition: all 0.2s; -webkit-user-select: none; user-select: none; }
.btn-opcao:active { transform: scale(0.98); }
.btn-opcao.active { background: #1a472a; color: white; border-color: #1a472a; }
.score-box { background: #1a472a; border: 3px solid #d4af37; border-radius: 12px; padding: 40px; text-align: center; margin: 20px 0; }
.score-value { font-size: 72px; color: #d4af37; font-weight: bold; }
.btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 10px 0; -webkit-user-select: none; user-select: none; }
.btn:active { transform: scale(0.98); }
.btn-primary { background: #1a472a; color: white; }
.btn-limpar { background: #d4af37; color: #1a472a; padding: 10px 20px; border: none; border-radius: 6px 6px 0 0; margin-left: 20px; cursor: pointer; display: inline-block; }

.carta-box { 
  background: #1a472a; 
  border: 3px dashed #d4af37; 
  border-radius: 12px; 
  padding: 20px; 
  margin: 20px 0; 
}
.carta-titulo { 
  color: #d4af37; 
  font-size: 16px; 
  margin-bottom: 15px; 
  display: flex; 
  align-items: center; 
  gap: 8px; 
}
.carta-textarea { 
  width: 100%; 
  min-height: 500px; 
  padding: 15px; 
  border: none; 
  border-radius: 8px; 
  font-family: Arial, sans-serif; 
  font-size: 14px; 
  line-height: 1.6; 
  resize: vertical; 
  background: white;
  color: #333;
}
.btn-copiar { 
  width: 100%; 
  padding: 15px; 
  background: #d4af37; 
  color: #1a472a; 
  border: none; 
  border-radius: 8px; 
  font-size: 16px; 
  font-weight: bold; 
  cursor: pointer; 
  margin-top: 15px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  gap: 8px; 
}
.btn-copiar:hover { background: #c4a027; }

.tabs { display: flex; gap: 10px; margin: 20px 0; }
.tab-btn { flex: 1; padding: 12px; border: none; background: #ddd; cursor: pointer; border-radius: 6px; font-weight: bold; -webkit-user-select: none; user-select: none; }
.tab-btn:active { transform: scale(0.98); }
.tab-btn.active { background: #1a472a; color: white; }
.tab-content { display: none; }
.tab-content.active { display: block; }

#tabelaRanking { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; }
#tabelaRanking th, #tabelaRanking td { border: 1px solid #ddd; padding: 12px; text-align: left; color: #333; }
#tabelaRanking th { background: #1a472a; color: white; }
#tabelaRanking tr:hover { background: #f9f9f9; }
.btn-acao { padding: 6px 12px; margin: 0 4px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; -webkit-user-select: none; user-select: none; }
.btn-acao:active { transform: scale(0.95); }
.btn-editar { background: #1a472a; color: white; }
.btn-excluir { background: #dc3545; color: white; }
.camping-input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 6px; margin: 10px 0; }
</style>
</head>
<body>
<div class="header">
  <h1>Guia <em>Exkombeiros</em></h1>
  <p>PAINEL DO ADMINISTRADOR</p>
  <div class="stats">
    <div class="stat">
      <div class="stat-label">CAMPINGS</div>
      <div class="stat-value" id="totalCampings">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">SCORE MÉDIO</div>

</div>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" id="tabAvaliacao">Avaliação</button>
    <button class="tab-btn" id="tabRanking">Ranking</button>
  </div>

  <div id="avaliacao" class="tab-content active">
    <button class="btn-limpar" id="btnLimpar">🧹 Limpar</button>
    
    <div class="section-card">
      <div class="section-header">
        <div class="section-title">📋 Dados do Camping</div>
      </div>
      <div class="item-card">
        <div class="item-label">NOME DO CAMPING</div>
        <input type="text" id="nomeCamping" class="camping-input" placeholder="Ex: Camping Cuiabá">
      </div>
      <div class="item-card">
        <div class="item-label">CIDADE</div>
        <input type="text" id="cidadeCamping" class="camping-input" placeholder="Ex: Tiradentes">
      </div>
      <div class="item-card">
        <div class="item-label">ESTADO</div>
        <input type="text" id="estadoCamping" class="camping-input" placeholder="Ex: MG" maxlength="2">
      </div>
      <div class="item-card">
        <div class="item-label">DATA DA VISITA</div>
        <input type="date" id="dataVisita" class="camping-input">
      </div>
    </div>
    
    <div id="categorias"></div>
    
    <div class="score-box">
      <div class="score-value score-display" id="scoreFinalBox">0.0</div>
    </div>
    
    <button class="btn btn-primary" id="btnSalvar">💾 Salvar Avaliação no Ranking</button>

    <div class="carta-box">
      <div class="carta-titulo">📝 Texto Automático da Carta</div>
      <textarea id="textoApresentacao" class="carta-textarea" readonly></textarea>
      <button class="btn-copiar" id="btnCopiar">📋 Copiar Texto Completo</button>
    </div>
  </div>

  <div id="ranking" class="tab-content">
    <h3 style="color:#1a472a;margin:20px 0;">Ranking de Campings Avaliados</h3>
    <table id="tabelaRanking">
      <thead>
        <tr>
          <th>Camping</th>
          <th>Score</th>
          <th>Data</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="rankingBody"></tbody>
    </table>
  </div>
</div>

      { nome: 'NÍVEL DO TERRENO', opcoes: [{label: 'Plano', pontos: 5}, {label: 'Leve inclinação', pontos: 3}, {label: 'Muito inclinado', pontos: 0}], selecionado: 2 },

      { nome: 'RESTAURANTE', opcoes: [{label: 'No camping', pontos: 5}, {label: 'Próximo', pontos: 3}, {label: 'Não tem', pontos: 0}], selecionado: 2 }

function safeGetEl(id) {
  return document.getElementById(id) || null;
}

function copiarTextoCompleto() {
  const el = safeGetEl('textoApresentacao');
  if (!el) return;
  navigator.clipboard.writeText(el.value).then(() => {
    alert('Carta copiada!');
  }).catch(() => {
    alert('Erro ao copiar');
  });
}

function openTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const tabEl = safeGetEl(tab);
  const btnEl = safeGetEl('tab' + tab.charAt(0).toUpperCase() + tab.slice(1));
  if (tabEl) tabEl.classList.add('active');
  if (btnEl) btnEl.classList.add('active');
  if (tab === 'ranking') carregarRanking();
}

function renderCategorias() {
  const container = safeGetEl('categorias');
  if (!container) return;
  container.innerHTML = '';
  
  categorias.forEach((cat, catIdx) => {
    const section = document.createElement('div');
    section.className = 'section-card';
    section.innerHTML = `
      <div class="section-header">
        <div class="section-title">${cat.nome}</div>
        <div class="peso-badge">Peso ${cat.peso}%</div>
      </div>
    `;
    
    cat.itens.forEach((item, itemIdx) => {
      const itemCard = document.createElement('div');
      itemCard.className = 'item-card';
      
      let botoesHTML = '<div class="btn-group">';
      item.opcoes.forEach((opcao, opcaoIdx) => {
        const activeClass = opcaoIdx === item.selecionado ? 'active' : '';
        botoesHTML += `<button class="btn-opcao ${activeClass}" data-cat="${catIdx}" data-item="${itemIdx}" data-opcao="${opcaoIdx}">${opcao.label}</button>`;
      });
      botoesHTML += '</div>';
      
      itemCard.innerHTML = `
        <div class="item-label">${item.nome}</div>
        ${botoesHTML}
      `;
      section.appendChild(itemCard);
    });
    
    container.appendChild(section);
  });
  
  calcularScore();
}

function calcularScore() {
  let somaTotal = 0;
  let pesoTotal = 0;
  
  categorias.forEach((cat) => {
    let somaCat = 0;
    let countCat = 0;
    
    cat.itens.forEach((item) => {
      const pontos = item.opcoes[item.selecionado].pontos;
      somaCat += pontos;
      countCat++;
    });
    
    if (countCat > 0) {
      const mediaCat = somaCat / countCat;
      somaTotal += mediaCat * (cat.peso / 100);
      pesoTotal += cat.peso / 100;
    }
  });
  
  const scoreFinal = pesoTotal > 0 ? (somaTotal / pesoTotal) : 0;
  
  const scoreBoxEl = safeGetEl('scoreFinalBox');
  const scoreMedioEl = safeGetEl('scoreMedio');
  
  if (scoreBoxEl) scoreBoxEl.textContent = scoreFinal.toFixed(1);
  if (scoreMedioEl) scoreMedioEl.textContent = scoreFinal.toFixed(1);
  
  gerarCartaAutomatica(scoreFinal);
  return scoreFinal;
}

function gerarCartaAutomatica(score) {
  const el = safeGetEl('textoApresentacao');
  if (!el) return;
  
  const nomeCamping = safeGetEl('nomeCamping')?.value.trim() || 'Camping';
  const cidade = safeGetEl('cidadeCamping')?.value.trim() || 'Cidade';
  const estado = safeGetEl('estadoCamping')?.value.trim() || 'UF';
  const dataInput = safeGetEl('dataVisita')?.value;
  const dataVisita = dataInput ? dataInput.split('-').reverse().join('/') : new Date().toLocaleDateString('pt-BR');
  
  let detalhesNotas = '';
  let melhorias = [];
  
  categorias.forEach((cat) => {
    let somaCat = 0;
    let countCat = 0;
    let itensRuins = [];
    
    cat.itens.forEach((item) => {
      const pontos = item.opcoes[item.selecionado].pontos;
      somaCat += pontos;
      countCat++;
      if (pontos < 4) {
        itensRuins.push(`${item.nome}: ${item.opcoes[item.selecionado].label}`);
      }
    });
    
    if (countCat > 0) {
      const mediaCat = (somaCat / countCat).toFixed(1);
      detalhesNotas += `${cat.nome}\n${mediaCat} / 5\n`;
      
      if (itensRuins.length > 0 && (somaCat / countCat) < 4.5) {
        melhorias.push(`${cat.nome} — ${itensRuins.join(', ')}`);
      }
    }
  });
  
  let textoMelhorias = melhorias.length > 0 ? '\n🔧 OPORTUNIDADES DE MELHORIA\n\n' + melhorias.join('\n') + '\n' : '';
  
  const carta = `Apresentação
Prezada equipe do ${nomeCamping} — ${cidade} ${estado},
Somos Rogério e Viviane, criadores do Guia Exkombeiros de Camping, canal independente dedicado a viajantes com trailers, motorhomes e vans. Realizamos uma visita técnica ao seu camping em ${dataVisita} e compartilhamos abaixo os resultados.
Nossa Metodologia
O Guia Exkombeiros avalia campings com base em critérios técnicos e físicos mensuráveis — energia elétrica, qualidade da água, tipo de piso, banheiros, conectividade e serviços. Esta avaliação não mede experiência subjetiva nem o acolhimento humano do local.
Sabemos que muitos campings com estrutura mais simples oferecem experiências extraordinárias. Nossa missão é fornecer dados técnicos objetivos para viajantes que precisam dessas informações para planejar com segurança.
Score Técnico Final: ${score.toFixed(1)} / 5
${detalhesNotas}${textoMelhorias}Observações
No centro da cidade, fácil acesso. Perto de tudo.
Próximos Passos
Caso tenha melhorias, estaremos à disposição para nova solicitação e reavaliação do guia. Estamos à disposição para esclarecer qualquer dúvida sobre os critérios utilizados.
Atenciosamente,
Rogério e Viviane
Guia Exkombeiros de Camping
📧 guiaexkombeiros@gmail.com
YouTube · Instagram · TikTok: @exkombeiros`;
  
  el.value = carta;
}

function limparTudo() {
  categorias.forEach(cat => {
    cat.itens.forEach(item => {
      item.selecionado = item.opcoes.length - 1;
    });
  });
  safeGetEl('nomeCamping').value = '';
  safeGetEl('cidadeCamping').value = '';
  safeGetEl('estadoCamping').value = '';
  safeGetEl('dataVisita').value = '';
  editandoId = null;
  renderCategorias();
}

function salvarAvaliacao() {
  const nome = safeGetEl('nomeCamping')?.value.trim();
  const cidade = safeGetEl('cidadeCamping')?.value.trim();
  const estado = safeGetEl('estadoCamping')?.value.trim();
  
  if (!nome || !cidade || !estado) {
    alert('Preencha Nome, Cidade e Estado do camping antes de salvar!');
    return;
  }
  
  const nomeCompleto = `${nome} — ${cidade} ${estado}`;
  const score = calcularScore();
  const data = safeGetEl('dataVisita')?.value ? safeGetEl('dataVisita').value.split('-').reverse().join('/') : new Date().toLocaleDateString('pt-BR');
  
  let avaliacoes = JSON.parse(localStorage.getItem('avaliacoes_exkombeiros') || '[]');
  
  if (editandoId) {
    const idx = avaliacoes.findIndex(a => a.id === editandoId);
    if (idx !== -1) {
      avaliacoes[idx] = {
        id: editandoId,
        nome: nomeCompleto,
        nomeSimples: nome,
        cidade: cidade,
        estado: estado,
        score: score.toFixed(1),
        data: data,
        detalhes: JSON.parse(JSON.stringify(categorias))
      };
    }
    editandoId = null;
    alert('Avaliação atualizada!');
  } else {
    const novaAvaliacao = {
      id: Date.now(),
      nome: nomeCompleto,
      nomeSimples: nome,
      cidade: cidade,
      estado: estado,
      score: score.toFixed(1),
      data: data,
      detalhes: JSON.parse(JSON.stringify(categorias))
    };
    avaliacoes.push(novaAvaliacao);
    alert('Avaliação salva no ranking!');
  }
  
  localStorage.setItem('avaliacoes_exkombeiros', JSON.stringify(avaliacoes));
  atualizarEstatisticas();
  limparTudo();
}

function carregarRanking() {
  const avaliacoes = JSON.parse(localStorage.getItem('avaliacoes_exkombeiros') || '[]');
  const tbody = safeGetEl('rankingBody');
  if (!tbody) return;
  
  tbody.innerHTML = '';
  
  avaliacoes.sort((a, b) => parseFloat(b.score) - parseFloat(a.score));
  
  avaliacoes.forEach(av => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${av.nome}</td>
      <td>${av.score} / 5</td>
      <td>${av.data}</td>
      <td>
        <button class="btn-acao btn-editar" data-id="${av.id}" data-action="editar">Editar</button>
        <button class="btn-acao btn-excluir" data-id="${av.id}" data-action="excluir">Excluir</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
  
  atualizarEstatisticas();
}

function editarAvaliacao(id) {
  const avaliacoes = JSON.parse(localStorage.getItem('avaliacoes_exkombeiros') || '[]');
  const av = avaliacoes.find(a => a.id === id);
  if (!av) return;
  
  safeGetEl('nomeCamping').value = av.nomeSimples;
  safeGetEl('cidadeCamping').value = av.cidade;
  safeGetEl('estadoCamping').value = av.estado;
  
  const partesData = av.data.split('/');
  if (partesData.length === 3) {
    safeGetEl('dataVisita').value = `${partesData[2]}-${partesData[1]}-${partesData[0]}`;
  }
  
  categorias.forEach((cat, catIdx) => {
    cat.itens.forEach((item, itemIdx) => {
      item.selecionado = av.detalhes[catIdx].itens[itemIdx].selecionado;
    });
  });
  
  editandoId = id;
  openTab('avaliacao');
  renderCategorias();
}

function excluirAvaliacao(id) {
  let avaliacoes = JSON.parse(localStorage.getItem('avaliacoes_exkombeiros') || '[]');
  avaliacoes = avaliacoes.filter(a => a.id !== id);
  localStorage.setItem('avaliacoes_exkombeiros', JSON.stringify(avaliacoes));
  carregarRanking();
}

function atualizarEstatisticas() {
  const avaliacoes = JSON.parse(localStorage.getItem('avaliacoes_exkombeiros') || '[]');
  const totalEl = safeGetEl('totalCampings');
  if (totalEl) totalEl.textContent = avaliacoes.length;
  
  if (avaliacoes.length > 0) {
    const media = avaliacoes.reduce((sum, av) => sum + parseFloat(av.score), 0) / avaliacoes.length;
    const scoreMedioEl = safeGetEl('scoreMedio');
    if (scoreMedioEl) scoreMedioEl.textContent = media.toFixed(1);
    
    const estados = new Set(avaliacoes.map(av => av.estado));
    const totalEstadosEl = safeGetEl('totalEstados');
    if (totalEstadosEl) totalEstadosEl.textContent = estados.size;
  }
}

document.addEventListener('DOMContentLoaded', function() {
  // Tabs
  safeGetEl('tabAvaliacao').addEventListener('click', function() { openTab('avaliacao'); });
  safeGetEl('tabRanking').addEventListener('click', function() { openTab('ranking'); });
  
  // Botões principais
  safeGetEl('btnLimpar').addEventListener('click', limparTudo);
  safeGetEl('btnSalvar').addEventListener('click', salvarAvaliacao);
  safeGetEl('btnCopiar').addEventListener('click', copiarTextoCompleto);
  
  // Delegation para botões de opção e tabela
  document.addEventListener('click', function(e) {
    if (e.target.classList.contains('btn-opcao')) {
      const catIdx = parseInt(e.target.dataset.cat);
      const itemIdx = parseInt(e.target.dataset.item);
      const opcaoIdx = parseInt(e.target.dataset.opcao);
      
      categorias[catIdx].itens[itemIdx].selecionado = opcaoIdx;
      
      const parent = e.target.parentElement;
      parent.querySelectorAll('.btn-opcao').forEach(btn => btn.classList.remove('active'));
      e.target.classList.add('active');
      
      calcularScore();
    }
    
    if (e.target.classList.contains('btn-editar')) {
      const id = parseInt(e.target.dataset.id);
      editarAvaliacao(id);
    }
    
    if (e.target.classList.contains('btn-excluir')) {
      const id = parseInt(e.target.dataset.id);
      excluirAvaliacao(id);
    }
  });
  
  // Inputs
  ['nomeCamping', 'cidadeCamping', 'estadoCamping', 'dataVisita'].forEach(id => {
    const el = safeGetEl(id);
    if (el) {
      el.addEventListener('input', () => calcularScore());
      el.addEventListener('change', () => calcularScore());
    }
  });
  
  // Inicializa
  renderCategorias();
  carregarRanking();
});
</script>
</body>
</html>
