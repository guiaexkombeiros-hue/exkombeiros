// ── Utilitários ────────────────────────────────────────────────────────
function mostrarErro(msg) {
  var b = document.getElementById('erroBanner');
  if (b) { b.textContent = msg; b.style.display = 'block'; }
  console.error(msg);
}

function cacheLista() {
  var lista = [];
  var keys = Object.keys(avaliacoesCache);
  for (var i = 0; i < keys.length; i++) {
    var obj = avaliacoesCache[keys[i]];
    obj._key = keys[i];
    lista.push(obj);
  }
  return lista;
}

function toArray(nodeList) {
  return Array.prototype.slice.call(nodeList);
}

// ── Render categorias ──────────────────────────────────────────────────
function renderCategorias() {
  try {
    var container = document.getElementById('categorias');
    if (!container) return;
    container.innerHTML = '';
    for (var ci = 0; ci < categorias.length; ci++) {
      var cat = categorias[ci];
      var section = document.createElement('div');
      section.className = 'section-card';
      section.innerHTML = '<div class="section-header"><div class="section-title">' + cat.nome + '</div><div class="peso-badge">Peso ' + cat.peso + '%</div></div>';
      
      for (var ii = 0; ii < cat.itens.length; ii++) {
        var item = cat.itens[ii];
        var itemCard = document.createElement('div');
        itemCard.className = 'item-card';
        itemCard.innerHTML = '<div class="item-label">' + item.nome + '</div>';
        
        var btnGroup = document.createElement('div');
        btnGroup.className = 'btn-group';
        for (var oi = 0; oi < item.opcoes.length; oi++) {
          var btn = document.createElement('button');
          btn.className = 'btn-opcao' + (oi === item.selecionado ? ' active' : '');
          btn.textContent = item.opcoes[oi].label;
          btn.setAttribute('data-cat', ci);
          btn.setAttribute('data-item', ii);
          btn.setAttribute('data-opcao', oi);
          btnGroup.appendChild(btn);
        }

        itemCard.appendChild(btnGroup);
        section.appendChild(itemCard);
      }
      container.appendChild(section);
    }
    calcularScore();
  } catch (e) {
    mostrarErro('Erro ao renderizar categorias: ' + e.message);
  }
}

// ── Calcular score ─────────────────────────────────────────────────────
function calcularScore() {
  try {
    var somaTotal = 0, pesoTotal = 0;
    for (var ci = 0; ci < categorias.length; ci++) {
      var cat = categorias[ci];
      var somaCat = 0, countCat = 0;
      for (var ii = 0; ii < cat.itens.length; ii++) {
        somaCat += cat.itens[ii].opcoes[cat.itens[ii].selecionado].pontos;
        countCat++;
      }
      if (countCat > 0) {
        somaTotal += (somaCat / countCat) * (cat.peso / 100);
        pesoTotal += cat.peso / 100;
      }
    }
    var score = pesoTotal > 0 ? somaTotal / pesoTotal : 0;
    document.getElementById('scoreFinalBox').textContent = score.toFixed(1);
    gerarCartaAutomatica(score);
    return score;
  } catch (e) {
    mostrarErro('Erro ao calcular score: ' + e.message);
    return 0;
  }
}

      for (var ii = 0; ii < cat.itens.length; ii++) {

      }
      if (countCat > 0) {
        detalhesNotas += cat.nome + '\n' + (somaCat / countCat).toFixed(1) + ' / 5\n';
        if (ruins.length > 0 && (somaCat / countCat) < 4.5) {
          melhorias.push(cat.nome + ' - ' + ruins.join(', '));
        }
      }
    }
    var textoMelhorias = melhorias.length > 0
      ? '\nOPORTUNIDADES DE MELHORIA\n\n' + melhorias.join('\n') + '\n'
      : '';

    el.value =
      'Apresentacao\n' +
      'Prezada equipe do ' + nome + ' - ' + cidade + ' ' + estado + ',\n' +
      'Somos Rogerio e Viviane, criadores do Guia Exkombeiros de Camping, canal independente dedicado a viajantes com trailers, motorhomes e vans. Realizamos uma visita tecnica ao seu camping em ' + dataVisita + ' e compartilhamos abaixo os resultados.\n\n' +
      'Nossa Metodologia\n' +
      'O Guia Exkombeiros avalia campings com base em criterios tecnicos e fisicos mensuraveis - energia eletrica, qualidade da agua, tipo de piso, banheiros, conectividade e servicos. Esta avaliacao nao mede experiencia subjetiva nem o acolhimento humano do local.\n' +
      'Sabemos que muitos campings com estrutura mais simples oferecem experiencias extraordinarias. Nossa missao e fornecer dados tecnicos objetivos para viajantes que precisam dessas informacoes para planejar com seguranca.\n\n' +
      'Score Tecnico Final: ' + score.toFixed(1) + ' / 5\n\n' +
      detalhesNotas +
      textoMelhorias +
       (observacoes ? '\nObservacoes\n' + observacoes + '\n\n' : '\n') +
      'Proximos Passos\n' +
      'Caso tenha melhorias, estaremos a disposicao para nova solicitacao e reavaliacao do guia.\n\n' +
      'Atenciosamente,\nRogerio e Viviane\nGuia Exkombeiros de Camping\nguiaexkombeiros@gmail.com\nYouTube / Instagram / TikTok: @exkombeiros';
  } catch (e) {
    mostrarErro('Erro ao gerar carta: ' + e.message);
  }
}

// ── Limpar ─────────────────────────────────────────────────────────────
function limparTudo() {
  for (var ci = 0; ci < categorias.length; ci++) {
    for (var ii = 0; ii < categorias[ci].itens.length; ii++) {
      categorias[ci].itens[ii].selecionado = categorias[ci].itens[ii].opcoes.length - 1;
    }
  }
  document.getElementById('nomeCamping').value = '';
  document.getElementById('cidadeCamping').value = '';
  document.getElementById('estadoCamping').value = '';
  document.getElementById('dataVisita').value = '';
  var obsClear = document.getElementById('observacoesCamping'); if (obsClear) obsClear.value = '';
  var videoClear = document.getElementById('videoUrl'); if (videoClear) videoClear.value = '';
  editandoKey = null;
  renderCategorias();
}

// ── Salvar ─────────────────────────────────────────────────────────────
function salvarAvaliacao() {
  try {
    var nome   = document.getElementById('nomeCamping').value.trim();
    var cidade = document.getElementById('cidadeCamping').value.trim();
    var estado = document.getElementById('estadoCamping').value.trim();
    if (!nome || !cidade || !estado) {
      alert('Preencha Nome, Cidade e Estado antes de salvar!');
      return;
    }
    var score  = calcularScore();
    var dataRaw = document.getElementById('dataVisita').value;
    var data   = dataRaw ? dataRaw.split('-').reverse().join('/') : new Date().toLocaleDateString('pt-BR');
    var obsSaveEl = document.getElementById('observacoesCamping');
    var observacoesSave = obsSaveEl ? obsSaveEl.value.trim() : '';
    var videoUrlEl = document.getElementById('videoUrl');
    var videoUrlSave = videoUrlEl ? videoUrlEl.value.trim() : '';
    var entrada = {
      nome: nome + ' - ' + cidade + ' ' + estado,
      nomeSimples: nome, cidade: cidade, estado: estado,
      score: score.toFixed(1), data: data,
      observacoes: observacoesSave,
      videoUrl: videoUrlSave,
      detalhes: JSON.parse(JSON.stringify(categorias)),
      timestamp: Date.now()
    };
    if (!rankingRef) { alert('Firebase nao conectado.'); return; }
    if (editandoKey) {
      db.ref('ranking/' + editandoKey).update(entrada)
        .then(function() { editandoKey = null; alert('Avaliacao atualizada!'); limparTudo(); })
        .catch(function(e) { alert('Erro ao atualizar: ' + e.message); });
    } else {
      rankingRef.push(entrada)
        .then(function() { alert('Avaliacao salva!'); limparTudo(); })
        .catch(function(e) { alert('Erro ao salvar: ' + e.message); });
    }
  } catch (e) {
    mostrarErro('Erro ao salvar avaliacao: ' + e.message);
  }
}

// ── Ranking ───────────────────────────────────────────────────────────
function renderRanking() {
  try {
    var tbody = document.getElementById('rankingBody');
    if (!tbody) return;
    tbody.innerHTML = '';
    var lista = cacheLista();
    lista.sort(function(a, b) { return parseFloat(b.score) - parseFloat(a.score); });
    for (var i = 0; i < lista.length; i++) {
      var av = lista[i];
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + av.nome + '</td>' +
        '<td>' + av.score + ' / 5</td>' +
        '<td>' + av.data + '</td>' +
        '<td>' +
          '<button class="btn-acao btn-editar" data-key="' + av._key + '">Editar</button>' +
          '<button class="btn-acao btn-excluir" data-key="' + av._key + '">Excluir</button>' +
        '</td>';
      tbody.appendChild(tr);
    }
  } catch (e) {
    mostrarErro('Erro ao renderizar ranking: ' + e.message);
  }
}

function editarAvaliacao(key) {
  try {
    var av = avaliacoesCache[key];
    if (!av) return;
    document.getElementById('nomeCamping').value = av.nomeSimples || '';
    document.getElementById('cidadeCamping').value = av.cidade || '';
    document.getElementById('estadoCamping').value = av.estado || '';
    var obsEdit = document.getElementById('observacoesCamping'); if (obsEdit) obsEdit.value = av.observacoes || '';
    var videoEdit = document.getElementById('videoUrl'); if (videoEdit) videoEdit.value = av.videoUrl || '';
    var p = av.data ? av.data.split('/') : [];
    if (p.length === 3) document.getElementById('dataVisita').value = p[2] + '-' + p[1] + '-' + p[0];
    if (av.detalhes) {
      for (var ci = 0; ci < categorias.length; ci++) {
        for (var ii = 0; ii < categorias[ci].itens.length; ii++) {
          if (av.detalhes[ci] && av.detalhes[ci].itens[ii]) {
            categorias[ci].itens[ii].selecionado = av.detalhes[ci].itens[ii].selecionado;
          }
        }
      }
    }
    editandoKey = key;
    openTab('avaliacao');
    renderCategorias();
  } catch (e) {
    mostrarErro('Erro ao carregar avaliacao for edicao: ' + e.message);
  }
}

function excluirAvaliacao(key) {
  if (!confirm('Excluir este camping do ranking?')) return;
  try {
    if (!rankingRef) { alert('Firebase nao conectado.'); return; }
    rankingRef.child(key).remove()
      .catch(function(e) { alert('Erro ao excluir: ' + e.message); });
  } catch (e) {
    mostrarErro('Erro ao excluir: ' + e.message);
  }
}

// ── Tabs ──────────────────────────────────────────────────────────────
function openTab(tab) {
  var tabs    = toArray(document.querySelectorAll('.tab-content'));
  var btns    = toArray(document.querySelectorAll('.tab-btn'));
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  var tabEl = document.getElementById(tab);
  var btnEl = document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1));
  if (tabEl) tabEl.classList.add('active');
  if (btnEl) btnEl.classList.add('active');
  if (tab === 'ranking') renderRanking();
}

// ── Estatísticas ──────────────────────────────────────────────────────
function atualizarEstatisticas() {
  try {
    var lista = cacheLista();
    document.getElementById('totalCampings').textContent = lista.length;
    if (lista.length > 0) {
      var soma = 0;
      var estadosMap = {};
      for (var i = 0; i < lista.length; i++) {
        soma += parseFloat(lista[i].score) || 0;
        if (lista[i].estado) estadosMap[lista[i].estado] = 1;
      }
      document.getElementById('scoreMedio').textContent = (soma / lista.length).toFixed(1);
      document.getElementById('totalEstados').textContent = Object.keys(estadosMap).length;
    } else {
      document.getElementById('scoreMedio').textContent = '0.0';
      document.getElementById('totalEstados').textContent = '0';
    }
  } catch (e) {
    console.error('Erro estatisticas:', e);
  }
}

// ── Copiar ────────────────────────────────────────────────────────────
function copiarTexto() {
  try {
    var el = document.getElementById('textoApresentacao');
    if (!el) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(el.value)
        .then(function() { alert('Carta copiada!'); })
        .catch(function() { copiarFallback(el); });
    } else {
      copiarFallback(el);
    }
  } catch (e) {
    mostrarErro('Erro ao copiar: ' + e.message);
  }
}

function copiarFallback(el) {
  el.removeAttribute('readonly');
  el.select();
  try { document.execCommand('copy'); alert('Carta copiada!'); } catch (e) { alert('Selecione e copie manualmente.'); }
  el.setAttribute('readonly', true);
}

// ── PDF ───────────────────────────────────────────────────────────────
function baixarPdf() {
  try {
    if (!window.jspdf || !window.jspdf.jsPDF) { alert('Biblioteca PDF nao carregada. Verifique sua conexao.'); return; }
    var jsPDF = window.jspdf.jsPDF;
    var doc   = new jsPDF({ unit: 'mm', format: 'a4' });
    var pw    = doc.internal.pageSize.getWidth();
    var ph    = doc.internal.pageSize.getHeight();
    var ml = 20, mr = 20, maxW = pw - ml - mr;
    var y = 0;

    var nomeCamping = document.getElementById('nomeCamping').value.trim() || 'Camping';
    var cidade      = document.getElementById('cidadeCamping').value.trim() || '';
    var estado      = document.getElementById('estadoCamping').value.trim() || '';
    var dataInput   = document.getElementById('dataVisita').value;
    var dataVisita  = dataInput ? dataInput.split('-').reverse().join('/') : new Date().toLocaleDateString('pt-BR');
    var scoreTotal  = parseFloat(document.getElementById('scoreFinalBox').textContent) || 0;

    function sf(size, style, r, g, b) {
      doc.setFontSize(size);
      doc.setFont('helvetica', style || 'normal');
      doc.setTextColor(r !== undefined ? r : 50, g !== undefined ? g : 50, b !== undefined ? b : 50);
    }
    function tx(t, x, yy, opts) { doc.text(t, x, yy, opts || {}); }
    function checkPage() { if (y > ph - 22) { addRodape(); doc.addPage(); cabecalhoSub(); y = 22; } }
    function nl(n) { y += n || 6; checkPage(); }

    function bloco(txt, x, w) {
      sf(10, 'normal', 60, 60, 60);
      var linhas = doc.splitTextToSize(txt, w || maxW);
      for (var li = 0; li < linhas.length; li++) {
        checkPage();
        tx(linhas[li], x || ml, y);
        y += 5.5;
      }
    }

    function titulo(txt, nivel) {
      if (nivel === 1) {
        nl(4);
        sf(13, 'bold', 26, 71, 42);
        tx(txt, ml, y); y += 2;
        doc.setDrawColor(26, 71, 42); doc.setLineWidth(0.4);
        doc.line(ml, y, pw - mr, y); y += 5;
      } else {
        nl(3); sf(10, 'bold', 26, 71, 42); tx(txt, ml, y); y += 5;
      }
    }

    function cabecalhoPrincipal() {
      doc.setFillColor(26, 71, 42);
      doc.rect(0, 0, pw, 40, 'F');
      doc.setFillColor(212, 175, 55);
      doc.rect(0, 40, pw, 1.5, 'F');
      sf(22, 'bold', 212, 175, 55);
      tx('GUIA EXKOMBEIROS', pw / 2, 16, { align: 'center' });
      sf(9, 'normal', 200, 230, 200);
      tx('AVALIACAO TECNICA DE CAMPING', pw / 2, 25, { align: 'center' });
      sf(11, 'bold', 255, 255, 255);
      tx(nomeCamping.toUpperCase(), pw / 2, 35, { align: 'center' });
      y = 52;
    }

    function cabecalhoSub() {
      doc.setFillColor(26, 71, 42);
      doc.rect(0, 0, pw, 12, 'F');
      sf(9, 'bold', 212, 175, 55);
      tx('GUIA EXKOMBEIROS  —  ' + nomeCamping.toUpperCase(), ml, 8);
      y = 18;
    }

    function addRodape() {
      doc.setDrawColor(200, 200, 200); doc.setLineWidth(0.3);
      doc.line(ml, ph - 14, pw - mr, ph - 14);
      sf(8, 'normal', 150, 150, 150);
      tx('guiaexkombeiros@gmail.com  |  @exkombeiros  |  YouTube / Instagram / TikTok', ml, ph - 9);
    }

    cabecalhoPrincipal();

    doc.setFillColor(245, 248, 244);
    doc.roundedRect(ml, y, maxW, 28, 2, 2, 'F');
    doc.setFillColor(26, 71, 42);
    doc.roundedRect(ml, y, 3, 28, 1, 1, 'F');
    sf(8, 'normal', 120, 120, 120);
    tx('LOCAL', ml + 8, y + 7);
    tx('DATA DA VISITA', ml + 8, y + 18);
    tx('SCORE GERAL', pw / 2 + 5, y + 7);
    sf(11, 'bold', 30, 30, 30);
    tx(nomeCamping + (cidade ? '  —  ' + cidade + (estado ? ' / ' + estado : '') : ''), ml + 8, y + 13);
    sf(10, 'normal', 50, 50, 50);
    tx(dataVisita, ml + 8, y + 24);
    var sc = scoreTotal >= 4 ? [26,120,60] : scoreTotal >= 3 ? [160,100,0] : [180,40,40];
    sf(20, 'bold', sc[0], sc[1], sc[2]);
    tx(scoreTotal.toFixed(1) + ' / 5', pw / 2 + 5, y + 22);
    y += 36;

    titulo('Apresentacao', 1);
    bloco('Prezada equipe do ' + nomeCamping + ',');
    nl(2);
    bloco('Somos Rogerio e Viviane, criadores do Guia Exkombeiros de Camping, canal independente dedicado a viajantes com trailers, motorhomes e vans. Realizamos uma visita tecnica ao seu camping em ' + dataVisita + ' e compartilhamos abaixo os resultados.');
    nl(3);

    titulo('Nossa Metodologia', 1);
    bloco('O Guia Exkombeiros avalia campings com base em criterios tecnicos e fisicos mensuraveis: energia eletrica, qualidade da agua, tipo de piso, banheiros, conectividade e servicos. Esta avaliacao nao mede experiencia subjetiva nem o acolhimento humano do local.');
    nl(2);
    bloco('Sabemos que muitos campings com estrutura mais simples oferecem experiencias extraordinarias. Nossa missao e fornecer dados tecnicos objetivos para viajantes que precisam dessas informacoes para planejar com seguranca.');
    nl(5);

    titulo('Resultados por Categoria', 1);

    for (var ci = 0; ci < categorias.length; ci++) {
      var cat = categorias[ci];
      checkPage();
      var somaCat = 0, countCat = 0;
      for (var ii = 0; ii < cat.itens.length; ii++) {
        somaCat += cat.itens[ii].opcoes[cat.itens[ii].selecionado].pontos;
        countCat++;
      }
      var media = countCat > 0 ? somaCat / countCat : 0;
      var cor = media >= 4 ? [26,120,60] : media >= 2.5 ? [160,100,0] : [180,40,40];

      doc.setFillColor(240, 245, 240);
      doc.rect(ml, y, maxW, 9, 'F');
      sf(9, 'bold', 26, 71, 42);
      tx((ci + 1) + '. ' + cat.nome + '   (peso: ' + cat.peso + '%)', ml + 3, y + 6);
      sf(10, 'bold', cor[0], cor[1], cor[2]);
      tx(media.toFixed(1) + ' / 5', pw - mr, y + 6, { align: 'right' });
      var barY = y + 10;
      doc.setFillColor(220, 220, 220); doc.rect(ml, barY, maxW, 2.5, 'F');
      doc.setFillColor(cor[0], cor[1], cor[2]); doc.rect(ml, barY, maxW * (media / 5), 2.5, 'F');
      y += 16;

      for (var ii = 0; ii < cat.itens.length; ii++) {
        checkPage();
        var item = cat.itens[ii];
        var p = item.opcoes[item.selecionado].pontos;
        sf(8, 'normal', 80, 80, 80);
        tx(item.nome, ml + 4, y);
        var pcor = p >= 4 ? [26,100,60] : p >= 2 ? [140,100,0] : [180,40,40];
        sf(8, 'bold', pcor[0], pcor[1], pcor[2]);
        tx(item.opcoes[item.selecionado].label + '  (' + p + '/5)', pw - mr, y, { align: 'right' });
        y += 5;
      }
      y += 4;
    }

    var melhorias = [];
    for (var ci = 0; ci < categorias.length; ci++) {
      var ruins = [];
      for (var ii = 0; ii < categorias[ci].itens.length; ii++) {
        var item = categorias[ci].itens[ii];
        if (item.opcoes[item.selecionado].pontos < 4) {
          ruins.push(item.nome + ': ' + item.opcoes[item.selecionado].label);
        }
      }
      if (ruins.length > 0) melhorias.push({ cat: categorias[ci].nome, itens: ruins });
    }
    if (melhorias.length > 0) {
      checkPage();
      titulo('Oportunidades de Melhoria', 1);
      for (var mi = 0; mi < melhorias.length; mi++) {
        titulo(melhorias[mi].cat, 2);
        for (var ri = 0; ri < melhorias[mi].itens.length; ri++) {
          checkPage();
          sf(9, 'normal', 80, 80, 80);
          tx('  -  ' + melhorias[mi].itens[ri], ml, y); y += 5.5;
        }
      }
      y += 3;
    }

    checkPage();
    
    var obsPdfEl = document.getElementById('observacoesCamping');
    var obsPdf = obsPdfEl ? obsPdfEl.value.trim() : '';
    if (obsPdf) {
      checkPage();
      titulo('Observacoes', 1);
      bloco(obsPdf);
      nl(5);
    }
    
    titulo('Proximos Passos', 1);
    bloco('Caso tenha melhorias, estaremos a disposicao para nova solicitacao e reavaliacao do guia. Estamos a disposicao para esclarecer qualquer duvida sobre os criterios utilizados.');
    nl(6);

    checkPage();
    doc.setFillColor(26, 71, 42);
    doc.rect(ml, y, maxW, 22, 'F');
    sf(11, 'bold', 212, 175, 55); tx('Rogerio e Viviane', ml + 6, y + 8);
    sf(9, 'normal', 180, 220, 180); tx('Guia Exkombeiros de Camping', ml + 6, y + 15);
    sf(9, 'normal', 180, 220, 180);
    tx('guiaexkombeiros@gmail.com  |  @exkombeiros', pw - mr, y + 8, { align: 'right' });
    tx('YouTube  /  Instagram  /  TikTok', pw - mr, y + 15, { align: 'right' });
    y += 28;

    var totalPags = doc.internal.getNumberOfPages();
    for (var pg = 1; pg <= totalPags; pg++) {
      doc.setPage(pg);
      addRodape();
      sf(8, 'normal', 150, 150, 150);
      tx('Pagina ' + pg + ' de ' + totalPags, pw - mr, ph - 9, { align: 'right' });
    }

    var nomeArq = (document.getElementById('nomeCamping').value.trim() || 'camping').replace(/\s+/g, '-').toLowerCase();
    doc.save('avaliacao-' + nomeArq + '.pdf');

  } catch (e) {
    mostrarErro('Erro ao gerar PDF: ' + e.message);
  }
}

// ── Eventos ───────────────────────────────────────────────────────────
function initUI() {
  try {
    document.getElementById('tabAvaliacao').addEventListener('click', function() { openTab('avaliacao'); });
    document.getElementById('tabRanking').addEventListener('click', function() { openTab('ranking'); });
    document.getElementById('btnLimpar').addEventListener('click', limparTudo);
    document.getElementById('btnSalvar').addEventListener('click', salvarAvaliacao);
    document.getElementById('btnCopiar').addEventListener('click', copiarTexto);
    document.getElementById('btnPdf').addEventListener('click', baixarPdf);

    document.addEventListener('click', function(e) {
      var t = e.target;
      if (t.className.indexOf('btn-opcao') !== -1) {
        var ci = parseInt(t.getAttribute('data-cat'));
        var ii = parseInt(t.getAttribute('data-item'));
        var oi = parseInt(t.getAttribute('data-opcao'));
        categorias[ci].itens[ii].selecionado = oi;
        var irmaos = toArray(t.parentNode.querySelectorAll('.btn-opcao'));
        for (var i = 0; i < irmaos.length; i++) irmaos[i].classList.remove('active');
        t.classList.add('active');
        calcularScore();
      }
      if (t.className.indexOf('btn-editar') !== -1) editarAvaliacao(t.getAttribute('data-key'));
      if (t.className.indexOf('btn-excluir') !== -1) excluirAvaliacao(t.getAttribute('data-key'));
    });

    var inputs = ['nomeCamping','cidadeCamping','estadoCamping','dataVisita'];
    for (var i = 0; i < inputs.length; i++) {
      var el = document.getElementById(inputs[i]);
      if (el) {
        el.addEventListener('input', calcularScore);
        el.addEventListener('change', calcularScore);
      }
    }

    renderCategorias();

  } catch (e) {
    mostrarErro('Erro na inicializacao: ' + e.message);
  }
}

window.onload = function() {
  try {
    initUI();
  } catch(e) {
    console.error("UI init error", e);
  }
  initFirebase();
};
</script>
