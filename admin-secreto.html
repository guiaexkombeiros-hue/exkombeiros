// ── Firebase ───────────────────────────────────────────────────────────
function initFirebase() {
  try {
    if (typeof firebase === 'undefined') throw new Error('SDK do Firebase nao carregou');
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    rankingRef = db.ref('ranking');
    var fbEl = document.getElementById('fbStatus');
    if (fbEl) { fbEl.textContent = 'Firebase conectado'; fbEl.className = 'fb-status ok'; }
    rankingRef.on('value', function(snapshot) {
      try {
        avaliacoesCache = snapshot.val() || {};
        atualizarEstatisticas();
        var rt = document.getElementById('ranking');
        if (rt && rt.classList.contains('active')) renderRanking();
      } catch(e) { console.error('Erro listener:', e); }
    }, function(e) {
      var fbEl2 = document.getElementById('fbStatus');
      if (fbEl2) { fbEl2.textContent = 'Erro de conexao Firebase'; fbEl2.className = 'fb-status err'; }
      mostrarErro('Firebase offline. A avaliacao continua funcionando localmente.');
    });
  } catch(e) {
    var fbEl = document.getElementById('fbStatus');
    if (fbEl) { fbEl.textContent = 'Firebase offline: ' + e.message; fbEl.className = 'fb-status err'; }
    mostrarErro('Firebase nao inicializou.');
    db = null; rankingRef = null;
  }
}

function mostrarErro(msg) {
  var b = document.getElementById('erroBanner');
  if (b) { b.textContent = msg; b.style.display = 'block'; }
}

function cacheLista() {
  var lista = [], keys = Object.keys(avaliacoesCache);
  for (var i=0;i<keys.length;i++) { var o=avaliacoesCache[keys[i]]; o._key=keys[i]; lista.push(o); }
  return lista;
}

function toArr(nl) { return Array.prototype.slice.call(nl); }

// ── Render categorias ──────────────────────────────────────────────────
function renderCategorias() {
  var container = document.getElementById('categorias');
  if (!container) return;
  container.innerHTML = '';
  for (var ci=0; ci<categorias.length; ci++) {
    var cat = categorias[ci];

    section.innerHTML = '<div class="section-header"><div class="section-title">' + cat.nome + '</div><div class="peso-badge">Peso ' + cat.peso + '%</div></div>';
    for (var ii=0; ii<cat.itens.length; ii++) {
      var item = cat.itens[ii];
      var ic = document.createElement('div'); ic.className='item-card';
      ic.innerHTML = '<div class="item-label">'+item.nome+'</div>';
      var bg = document.createElement('div'); bg.className='btn-group';
      for (var oi=0; oi<item.opcoes.length; oi++) {
        var btn = document.createElement('button');
        btn.className = 'btn-opcao' + (oi===item.selecionado?' active':'');
        btn.textContent = item.opcoes[oi].label;
        btn.setAttribute('data-cat', ci);
        btn.setAttribute('data-item', ii);
        btn.setAttribute('data-opcao', oi);
        bg.appendChild(btn);
      }

      section.appendChild(ic);
    }

    container.appendChild(section);
  }
  setUnissex(dadosBanheiros.unissex);
  setNivelAcesso(nivelAcesso);
  calcularScore();
}

// ── Score ──────────────────────────────────────────────────────────────
function calcularScore() {
  var somaTotal=0, pesoTotal=0;
  for (var ci=0; ci<categorias.length; ci++) {
    var cat=categorias[ci], soma=0, count=0;
    for (var ii=0; ii<cat.itens.length; ii++) { soma+=cat.itens[ii].opcoes[cat.itens[ii].selecionado].pontos; count++; }
    if (count>0) {
      var media = soma/count;
      if (cat.nome==='Banheiros' && dadosBanheiros.unissex) media = Math.max(0, media-1);
      somaTotal += media*(cat.peso/100);
      pesoTotal += cat.peso/100;
    }
  }
  var score = pesoTotal>0 ? somaTotal/pesoTotal : 0;
  var el = document.getElementById('scoreFinalBox');
  if (el) el.textContent = score.toFixed(1);
  gerarCarta(score);
  return score;
}

// ── Carta ──────────────────────────────────────────────────────────────
function gerarCarta(score) {
  var el = document.getElementById('textoApresentacao'); if (!el) return;
  var nome      = document.getElementById('nomeCamping').value.trim()||'Camping';
  var cidade    = document.getElementById('cidadeCamping').value.trim()||'Cidade';
  var estado    = document.getElementById('estadoCamping').value.trim()||'UF';
  var dataInput = document.getElementById('dataVisita').value;
  var dataV     = dataInput ? dataInput.split('-').reverse().join('/') : new Date().toLocaleDateString('pt-BR');
  var obs       = (document.getElementById('observacoesCamping')||{}).value||'';

  var infoBnh = '\nBANHEIROS - DETALHAMENTO\n';
  infoBnh += 'Masculino: '+dadosBanheiros.masc_sanitarios+' sanitario(s), '+dadosBanheiros.masc_chuveiros+' chuveiro(s)\n';
  infoBnh += 'Feminino: '+dadosBanheiros.fem_sanitarios+' sanitario(s), '+dadosBanheiros.fem_chuveiros+' chuveiro(s)\n';
  infoBnh += dadosBanheiros.unissex ? 'Tipo: Unissex (penalidade aplicada)\n' : 'Tipo: Separado M/F\n';

  var labelAcesso = nivelAcesso==='facil' ? 'Facil' : (nivelAcesso==='atencao' ? 'Atencao' : 'Dificil');
  var infoAcesso = '\nNIVEL DE ACESSO PARA TRAILER/MOTORHOME\n' + labelAcesso + '\n';

  var detalhes='', melhorias=[];
  for (var ci=0; ci<categorias.length; ci++) {
    var cat=categorias[ci], soma=0, count=0, ruins=[];
    for (var ii=0; ii<cat.itens.length; ii++) {
      var p=cat.itens[ii].opcoes[cat.itens[ii].selecionado].pontos;
      soma+=p; count++;
      if (p<4) ruins.push(cat.itens[ii].nome+': '+cat.itens[ii].opcoes[cat.itens[ii].selecionado].label);
    }
    if (count>0) {
      var m=soma/count;
      if (cat.nome==='Banheiros'&&dadosBanheiros.unissex) m=Math.max(0,m-1);
      detalhes+=cat.nome+'\n'+m.toFixed(1)+' / 5\n';
      if (ruins.length>0&&m<4.5) melhorias.push(cat.nome+' - '+ruins.join(', '));
    }
  }
  var txtMel = melhorias.length>0 ? '\nOPORTUNIDADES DE MELHORIA\n\n'+melhorias.join('\n')+'\n' : '';

  el.value =
    'Apresentacao\n'+
    'Prezada equipe do '+nome+' - '+cidade+' '+estado+',\n'+
    'Somos Rogerio e Viviane, criadores do Guia Exkombeiros de Camping, canal independente dedicado a viajantes com trailers, motorhomes e vans. Realizamos uma visita tecnica ao seu camping em '+dataV+' e compartilhamos abaixo os resultados.\n\n'+
    'Nossa Metodologia\n'+
    'O Guia Exkombeiros avalia campings com base em criterios tecnicos e fisicos mensuraveis - energia eletrica, qualidade da agua, tipo de piso, banheiros, conectividade e servicos. Esta avaliacao nao mede experiencia subjetiva nem o acolhimento humano do local.\n'+
    'Sabemos que muitos campings com estrutura mais simples oferecem experiencias extraordinarias. Nossa missao e fornecer dados tecnicos objetivos para viajantes que precisam dessas informacoes para planejar com seguranca.\n\n'+
    'Score Tecnico Final: '+score.toFixed(1)+' / 5\n\n'+
    detalhes+infoBnh+infoAcesso+txtMel+
    (obs ? '\nObservacoes\n'+obs+'\n\n' : '\n')+
    'Proximos Passos\n'+
    'Caso tenha melhorias, estaremos a disposicao para nova solicitacao e reavaliacao do guia.\n\n'+
    'Atenciosamente,\nRogerio e Viviane\nGuia Exkombeiros de Camping\nguiaexkombeiros@gmail.com\nYouTube / Instagram / TikTok: @exkombeiros';
}

// ── Limpar ─────────────────────────────────────────────────────────────
function limparTudo() {
  for (var ci=0;ci<categorias.length;ci++)
    for (var ii=0;ii<categorias[ci].itens.length;ii++)
      categorias[ci].itens[ii].selecionado = categorias[ci].itens[ii].opcoes.length-1;
  ['nomeCamping','cidadeCamping','estadoCamping','dataVisita'].forEach(function(id){ var e=document.getElementById(id); if(e) e.value=''; });
  var o=document.getElementById('observacoesCamping'); if(o) o.value='';
  var v=document.getElementById('videoUrl'); if(v) v.value='';
  dadosBanheiros={masc_sanitarios:0,masc_chuveiros:0,fem_sanitarios:0,fem_chuveiros:0,unissex:false};
  nivelAcesso = 'facil';
  editandoKey=null;
  renderCategorias();
}

// ── Salvar ─────────────────────────────────────────────────────────────
function salvarAvaliacao() {
  var nome=document.getElementById('nomeCamping').value.trim();
  var cidade=document.getElementById('cidadeCamping').value.trim();
  var estado=document.getElementById('estadoCamping').value.trim();
  if (!nome||!cidade||!estado) { alert('Preencha Nome, Cidade e Estado!'); return; }
  var score=calcularScore();
  var dataRaw=document.getElementById('dataVisita').value;
  var data=dataRaw?dataRaw.split('-').reverse().join('/'):new Date().toLocaleDateString('pt-BR');
  var obs=(document.getElementById('observacoesCamping')||{}).value||'';
  var vid=(document.getElementById('videoUrl')||{}).value||'';
  var entrada={
    nome:nome+' - '+cidade+' '+estado, nomeSimples:nome, cidade:cidade, estado:estado,
    score:score.toFixed(1), data:data, observacoes:obs, videoUrl:vid,
    detalhes:JSON.parse(JSON.stringify(categorias)),
    dadosBanheiros:JSON.parse(JSON.stringify(dadosBanheiros)),
    nivelAcesso: nivelAcesso,
    timestamp:Date.now()
  };
  if (!rankingRef) { alert('Firebase nao conectado.'); return; }
  if (editandoKey) {
    db.ref('ranking/'+editandoKey).update(entrada)
      .then(function(){ editandoKey=null; alert('Atualizado!'); limparTudo(); })
      .catch(function(e){ alert('Erro: '+e.message); });
  } else {
    rankingRef.push(entrada)
      .then(function(){ alert('Salvo!'); limparTudo(); })
      .catch(function(e){ alert('Erro: '+e.message); });
  }
}

function editarAvaliacao(key) {
  var av=avaliacoesCache[key]; if(!av) return;
  document.getElementById('nomeCamping').value=av.nomeSimples||'';
  document.getElementById('cidadeCamping').value=av.cidade||'';
  document.getElementById('estadoCamping').value=av.estado||'';
  var o=document.getElementById('observacoesCamping'); if(o) o.value=av.observacoes||'';
  var v=document.getElementById('videoUrl'); if(v) v.value=av.videoUrl||'';
  var p=av.data?av.data.split('/'):[]; if(p.length===3) document.getElementById('dataVisita').value=p[2]+'-'+p[1]+'-'+p[0];
  if (av.detalhes) {
    for (var ci=0;ci<categorias.length;ci++)
      for (var ii=0;ii<categorias[ci].itens.length;ii++)
        if (av.detalhes[ci]&&av.detalhes[ci].itens[ii]) categorias[ci].itens[ii].selecionado=av.detalhes[ci].itens[ii].selecionado;
  }
  if (av.dadosBanheiros) dadosBanheiros=JSON.parse(JSON.stringify(av.dadosBanheiros));
  nivelAcesso = av.nivelAcesso || 'facil';
  editandoKey=key;
  openTab('avaliacao');
  renderCategorias();
  var ms=document.getElementById('bnh_masc_san'); if(ms) ms.value=dadosBanheiros.masc_sanitarios;
  var mc=document.getElementById('bnh_masc_chu'); if(mc) mc.value=dadosBanheiros.masc_chuveiros;
  var fs=document.getElementById('bnh_fem_san');  if(fs) fs.value=dadosBanheiros.fem_sanitarios;
  var fc=document.getElementById('bnh_fem_chu');  if(fc) fc.value=dadosBanheiros.fem_chuveiros;
  setUnissex(dadosBanheiros.unissex);
  setNivelAcesso(nivelAcesso);
}

function excluirAvaliacao(key) {
  if (!confirm('Excluir este camping?')) return;
  if (!rankingRef) { alert('Firebase nao conectado.'); return; }
  rankingRef.child(key).remove().catch(function(e){ alert('Erro: '+e.message); });
}

function openTab(tab) {
  toArr(document.querySelectorAll('.tab-content')).forEach(function(e){e.classList.remove('active');});
  toArr(document.querySelectorAll('.tab-btn')).forEach(function(e){e.classList.remove('active');});
  var te=document.getElementById(tab); if(te) te.classList.add('active');
  var be=document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)); if(be) be.classList.add('active');
  if (tab==='ranking') renderRanking();
}

function atualizarEstatisticas() {
  var lista=cacheLista();
  document.getElementById('totalCampings').textContent=lista.length;
  if (lista.length>0) {
    var soma=0, estados={};
    lista.forEach(function(c){ soma+=parseFloat(c.score)||0; if(c.estado) estados[c.estado]=1; });
    document.getElementById('scoreMedio').textContent=(soma/lista.length).toFixed(1);
    document.getElementById('totalEstados').textContent=Object.keys(estados).length;
  } else {
    document.getElementById('scoreMedio').textContent='0.0';
    document.getElementById('totalEstados').textContent='0';
  }
}

function copiarTexto() {
  var el=document.getElementById('textoApresentacao'); if(!el) return;
  if (navigator.clipboard&&navigator.clipboard.writeText) {
    navigator.clipboard.writeText(el.value).then(function(){alert('Carta copiada!');}).catch(function(){copiarFallback(el);});
  } else copiarFallback(el);
}
function copiarFallback(el) {
  el.removeAttribute('readonly'); el.select();
  try{document.execCommand('copy');alert('Carta copiada!');}catch(e){alert('Selecione e copie manualmente.');}
  el.setAttribute('readonly',true);
}

      var corAcessoPdf = nivelAcesso==='facil' ? [26,120,60] : (nivelAcesso==='atencao' ? [160,100,0] : [180,40,40]);
      sf(8,'bold',corAcessoPdf[0],corAcessoPdf[1],corAcessoPdf[2]);
      tx('Nivel de acesso para trailer/motorhome: '+labelAcessoPdf,ml+4,y);y+=5;
    }
    y+=4;
  }

  var melhorias=[];
  for(var ci=0;ci<categorias.length;ci++){
    var ruins=[];
    for(var ii=0;ii<categorias[ci].itens.length;ii++){var item=categorias[ci].itens[ii];if(item.opcoes[item.selecionado].pontos<4)ruins.push(item.nome+': '+item.opcoes[item.selecionado].label);}
    if(ruins.length>0)melhorias.push({cat:categorias[ci].nome,itens:ruins});
  }
  if(melhorias.length>0){
    checkPage();titulo('Oportunidades de Melhoria',1);
    for(var mi=0;mi<melhorias.length;mi++){titulo(melhorias[mi].cat,2);for(var ri=0;ri<melhorias[mi].itens.length;ri++){checkPage();sf(9,'normal',80,80,80);tx('  -  '+melhorias[mi].itens[ri],ml,y);y+=5.5;}}
    y+=3;
  }

  var obsPdf=(document.getElementById('observacoesCamping')||{}).value||'';
  if(obsPdf){checkPage();titulo('Observacoes',1);bloco(obsPdf);nl(5);}

  titulo('Proximos Passos',1);
  bloco('Caso tenha melhorias, estaremos a disposicao para nova solicitacao e reavaliacao do guia.');nl(6);

  checkPage();
  doc.setFillColor(26,71,42);doc.rect(ml,y,maxW,22,'F');
  sf(11,'bold',212,175,55);tx('Rogerio e Viviane',ml+6,y+8);
  sf(9,'normal',180,220,180);tx('Guia Exkombeiros de Camping',ml+6,y+15);
  tx('guiaexkombeiros@gmail.com  |  @exkombeiros',pw-mr,y+8,{align:'right'});
  tx('YouTube  /  Instagram  /  TikTok',pw-mr,y+15,{align:'right'});

  var tot=doc.internal.getNumberOfPages();
  for(var pg=1;pg<=tot;pg++){doc.setPage(pg);addRodape();sf(8,'normal',150,150,150);tx('Pagina '+pg+' de '+tot,pw-mr,ph-9,{align:'right'});}
  var nomeArq=(document.getElementById('nomeCamping').value.trim()||'camping').replace(/\s+/g,'-').toLowerCase();
  doc.save('avaliacao-'+nomeArq+'.pdf');
}

// ── Init ───────────────────────────────────────────────────────────────
function initUI() {
  document.getElementById('tabAvaliacao').addEventListener('click',function(){openTab('avaliacao');});
  document.getElementById('tabRanking').addEventListener('click',function(){openTab('ranking');});
  document.getElementById('btnLimpar').addEventListener('click',limparTudo);
  document.getElementById('btnSalvar').addEventListener('click',salvarAvaliacao);
  document.getElementById('btnCopiar').addEventListener('click',copiarTexto);
  document.getElementById('btnPdf').addEventListener('click',baixarPdf);

  document.addEventListener('click',function(e){
    var t=e.target;
    if(t.className.indexOf('btn-opcao')!==-1&&t.hasAttribute('data-cat')){
      var ci=parseInt(t.getAttribute('data-cat')),ii=parseInt(t.getAttribute('data-item')),oi=parseInt(t.getAttribute('data-opcao'));
      categorias[ci].itens[ii].selecionado=oi;
      toArr(t.parentNode.querySelectorAll('.btn-opcao')).forEach(function(b){b.classList.remove('active');});
      t.classList.add('active');
      calcularScore();
    }
    if(t.className.indexOf('btn-editar')!==-1)editarAvaliacao(t.getAttribute('data-key'));
    if(t.className.indexOf('btn-excluir')!==-1)excluirAvaliacao(t.getAttribute('data-key'));
  });

  ['nomeCamping','cidadeCamping','estadoCamping','dataVisita'].forEach(function(id){
    var el=document.getElementById(id);
    if(el){el.addEventListener('input',calcularScore);el.addEventListener('change',calcularScore);}
  });

  renderCategorias();
}

window.onload=function(){initUI();initFirebase();};
</script>
</body></html>
